<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dreamcore 3D Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>

<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Fondo
  const loader = new THREE.TextureLoader();
  loader.load("deamcore.jpg", tex => scene.background = tex);

  // Luces
  const ambient = new THREE.AmbientLight(0x404040, 1);
  scene.add(ambient);
  const flashlight = new THREE.SpotLight(0xffffff, 2, 100, Math.PI/6);
  scene.add(flashlight);
  scene.add(flashlight.target);

  // Suelo
  loader.load("grass_ps1.png", grassTex => {
    grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
    grassTex.repeat.set(50,50);
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(500,500),
      new THREE.MeshLambertMaterial({map:grassTex})
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);
  });

  // Árboles billboards
  const trees = [];
  loader.load("tree_ps1.png", treeTex => {
    const mat = new THREE.MeshBasicMaterial({map:treeTex, transparent:true, side:THREE.DoubleSide});
    for(let i=0;i<20;i++){
      const tree = new THREE.Mesh(new THREE.PlaneGeometry(10,20), mat);
      tree.position.set(Math.random()*400-200,10,Math.random()*400-200);
      scene.add(tree);
      trees.push(tree);
    }
  });

  // Controles
  const controls = new THREE.PointerLockControls(camera, document.body);
  document.body.addEventListener('click', () => {
    controls.lock();
    // Iniciar música al primer clic
    if(!bgSound.isPlaying) bgSound.play();
  });
  camera.position.set(0,2,0);

  let keys={};
  document.addEventListener('keydown', e=>{
    keys[e.code]=true;
    if(e.code==="Escape"){
      window.open('', '_self').close(); // Cierra la pestaña
    }
  });
  document.addEventListener('keyup', e=>keys[e.code]=false);

  // Sonidos
  const listener = new THREE.AudioListener();
  camera.add(listener);
  const audioLoader = new THREE.AudioLoader();

  const bgSound = new THREE.Audio(listener);
  audioLoader.load("dreamcore.mp3", buffer => {
    bgSound.setBuffer(buffer);
    bgSound.setLoop(true);
    bgSound.setVolume(0.5);
  });

  const stepSound = new THREE.Audio(listener);
  audioLoader.load("pasos.mp3", buffer => {
    stepSound.setBuffer(buffer);
    stepSound.setLoop(false);
    stepSound.setVolume(0.7);
  });

  function animate(){
    requestAnimationFrame(animate);

    if(keys["KeyW"]) { controls.moveForward(0.15); if(!stepSound.isPlaying) stepSound.play(); }
    if(keys["KeyS"]) { controls.moveForward(-0.15); if(!stepSound.isPlaying) stepSound.play(); }
    if(keys["KeyA"]) { controls.moveRight(-0.15); if(!stepSound.isPlaying) stepSound.play(); }
    if(keys["KeyD"]) { controls.moveRight(0.15); if(!stepSound.isPlaying) stepSound.play(); }

    // Linterna sigue la cámara
    flashlight.position.copy(camera.position);
    const dir = camera.getWorldDirection(new THREE.Vector3());
    flashlight.target.position.set(
      camera.position.x+dir.x,
      camera.position.y+dir.y,
      camera.position.z+dir.z
    );

    // Árboles miran a la cámara
    trees.forEach(t=>t.lookAt(camera.position));

    renderer.render(scene,camera);
  }
  animate();
</script>
</body>
</html>
