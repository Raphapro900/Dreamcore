<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamcore 3D · Camino Infinito con Pasos</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 18px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            gap: 30px;
        }
        #info span {
            font-weight: bold;
            color: #ffd700;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            justify-content: center;
        }
        #controls button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
            min-width: 80px;
        }
        #controls button:hover {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
            transform: scale(1.05);
        }
        #controls button:active {
            transform: scale(0.95);
        }
        #controls button.active {
            background: rgba(255,215,0,0.3);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 20px;
            z-index: 20;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        #loading .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            font-size: 40px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .fade-out {
            animation: fadeOut 0.8s forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; pointer-events: none; }
        }
        #controls-hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            #info {
                font-size: 14px;
                padding: 8px 16px;
                gap: 15px;
                top: 10px;
                left: 10px;
            }
            #controls {
                padding: 10px 15px;
                gap: 10px;
                bottom: 15px;
                width: 95%;
            }
            #controls button {
                padding: 8px 15px;
                font-size: 14px;
                min-width: 60px;
            }
            #controls-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner">🌀</div>
        <div style="margin-top: 15px;">Cargando Dreamcore...</div>
        <div style="font-size: 14px; opacity: 0.6; margin-top: 8px;">(Haz clic para activar el audio)</div>
    </div>
    
    <div id="info">
        <div>🚶 <span id="distDisplay">0.00</span> km</div>
        <div>🔄 <span id="loopDisplay">0</span></div>
        <div>👣 <span id="stepDisplay">0</span></div>
    </div>
    
    <div id="controls">
        <button id="resetBtn">⟳ Reiniciar</button>
        <button id="speedBtn">⏩ x1</button>
        <button id="toggleMusicBtn">🔊 Música</button>
        <button id="toggleStepsBtn">👣 Pasos</button>
    </div>
    
    <div id="controls-hint">WASD · Caminar · Espacio para saltar</div>

    <!-- Importar Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CONFIGURACIÓN ---
        const CONFIG = {
            maxDistance: 12.0,
            teleportOffset: 8.0,
            speed: 0.035,
            treeSpacing: 1.8,
            numTrees: 120,
            stepInterval: 0.3, // segundos entre pasos
        };

        // --- ESTADO ---
        const state = {
            distance: 0,
            loopCount: 0,
            speedMultiplier: 1,
            clock: new THREE.Clock(),
            trees: [],
            treePositions: [],
            isMoving: false,
            steps: 0,
            stepTimer: 0,
            keys: { w: false, a: false, s: false, d: false },
            isWalking: false,
        };

        // --- DOM REFS ---
        const distDisplay = document.getElementById('distDisplay');
        const loopDisplay = document.getElementById('loopDisplay');
        const stepDisplay = document.getElementById('stepDisplay');
        const loadingDiv = document.getElementById('loading');

        // --- ESCENA Y RENDERERS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.008);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 3.2, 6);
        camera.lookAt(0, 0.5, -15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- CARGAR TEXTURAS ---
        const textureLoader = new THREE.TextureLoader();
        let skyTexture, grassTexture, treeTexture;
        let texturesLoaded = 0;
        const totalTextures = 3;

        function checkLoading() {
            texturesLoaded++;
            if (texturesLoaded === totalTextures) {
                setTimeout(() => {
                    loadingDiv.classList.add('fade-out');
                    setTimeout(() => loadingDiv.remove(), 800);
                }, 500);
                initScene();
            }
        }

        function loadTexture(url, fallbackColor) {
            return new Promise((resolve) => {
                textureLoader.load(
                    url,
                    (texture) => {
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                        resolve(texture);
                    },
                    undefined,
                    () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 64;
                        canvas.height = 64;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = fallbackColor || '#4a6b4a';
                        ctx.fillRect(0, 0, 64, 64);
                        const tex = new THREE.CanvasTexture(canvas);
                        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                        resolve(tex);
                    }
                );
            });
        }

        const skyPromise = loadTexture('dreamcore.jpg', '#2a2a4a');
        const grassPromise = loadTexture('grass_ps1.png', '#4a7a4a');
        const treePromise = loadTexture('tree_ps1.png', '#5a8a5a');

        Promise.all([skyPromise, grassPromise, treePromise]).then(([sky, grass, tree]) => {
            skyTexture = sky;
            grassTexture = grass;
            treeTexture = tree;
            checkLoading();
        });

        // --- AUDIO (pasos.mp3) ---
        let stepAudio, musicAudio;
        let stepEnabled = true;
        let musicEnabled = true;

        function loadAudio() {
            try {
                // Pasos
                stepAudio = new Audio('pasos.mp3');
                stepAudio.volume = 0.3;
                stepAudio.load();
                
                // Música
                musicAudio = new Audio('dreamcore.mp3');
                musicAudio.loop = true;
                musicAudio.volume = 0.4;
                musicAudio.load();
            } catch (e) {
                console.log('Audio no disponible');
            }
        }

        function playStep() {
            if (!stepEnabled || !stepAudio) return;
            try {
                // Reiniciar y reproducir
                stepAudio.currentTime = 0;
                stepAudio.play().catch(() => {});
            } catch (e) {}
        }

        function toggleMusic() {
            if (!musicAudio) return;
            musicEnabled = !musicEnabled;
            if (musicEnabled) {
                musicAudio.play().catch(() => {});
            } else {
                musicAudio.pause();
            }
            return musicEnabled;
        }

        function toggleSteps() {
            stepEnabled = !stepEnabled;
            return stepEnabled;
        }

        // --- CREAR CIELO ---
        function createSky() {
            const skyGeo = new THREE.SphereGeometry(80, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({
                map: skyTexture,
                side: THREE.BackSide,
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            sky.position.y = 10;
            scene.add(sky);
            return sky;
        }

        // --- CREAR SUELO ---
        function createGround() {
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({
                map: grassTexture,
                roughness: 0.8,
                metalness: 0.0,
                side: THREE.DoubleSide,
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            return ground;
        }

        // --- CREAR ÁRBOL CON EFECTO BALDI ---
        function createTree(position) {
            const group = new THREE.Group();
            
            const trunkGeo = new THREE.CylinderGeometry(0.12, 0.18, 0.8, 6);
            const trunkMat = new THREE.MeshStandardMaterial({
                color: 0x6b4c3b,
                roughness: 0.9,
                metalness: 0.0,
            });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.4;
            trunk.castShadow = true;
            group.add(trunk);

            const leafGeo = new THREE.SphereGeometry(0.7, 8, 8);
            const leafMat = new THREE.MeshStandardMaterial({
                map: treeTexture,
                roughness: 0.6,
                metalness: 0.0,
                transparent: true,
                side: THREE.DoubleSide,
            });
            const leaves = new THREE.Mesh(leafGeo, leafMat);
            leaves.position.y = 1.1;
            leaves.castShadow = true;
            group.add(leaves);

            // Ojos (efecto Baldi)
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            
            const eyeGroupL = new THREE.Group();
            const eyeL = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.22), eyeMat);
            eyeL.position.set(0, 0, 0.01);
            const pupilL = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 0.12), pupilMat);
            pupilL.position.set(0, 0, 0.02);
            eyeGroupL.add(eyeL);
            eyeGroupL.add(pupilL);
            eyeGroupL.position.set(-0.22, 1.25, 0.55);
            group.add(eyeGroupL);

            const eyeGroupR = new THREE.Group();
            const eyeR = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.22), eyeMat);
            eyeR.position.set(0, 0, 0.01);
            const pupilR = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 0.12), pupilMat);
            pupilR.position.set(0, 0, 0.02);
            eyeGroupR.add(eyeR);
            eyeGroupR.add(pupilR);
            eyeGroupR.position.set(0.22, 1.25, 0.55);
            group.add(eyeGroupR);

            group.userData = {
                eyeL: eyeGroupL,
                eyeR: eyeGroupR,
                pupilL: pupilL,
                pupilR: pupilR,
            };

            group.position.copy(position);
            group.castShadow = true;
            scene.add(group);
            return group;
        }

        // --- GENERAR POSICIONES ---
        function generateTreePositions() {
            const positions = [];
            const total = CONFIG.numTrees;
            for (let i = 0; i < total; i++) {
                const z = -i * CONFIG.treeSpacing - 2;
                const x = (Math.random() - 0.5) * 3.0;
                positions.push(new THREE.Vector3(x, -0.5, z));
            }
            return positions;
        }

        // --- INICIALIZAR ---
        let skyMesh, groundMesh;
        let treeGroups = [];

        function initScene() {
            skyMesh = createSky();
            groundMesh = createGround();
            
            // Luces
            const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffeedd, 1.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);
            
            const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
            fillLight.position.set(-10, 5, -10);
            scene.add(fillLight);
            
            const hemiLight = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.6);
            scene.add(hemiLight);
            
            // Árboles
            const positions = generateTreePositions();
            treeGroups = positions.map(pos => createTree(pos));
            state.treePositions = positions;
            state.trees = treeGroups;
            
            // Partículas
            createAtmosphere();
            
            // Audio
            loadAudio();
            
            // Eventos
            setupControls();
            
            animate();
        }

        // --- ATMÓSFERA ---
        function createAtmosphere() {
            const particleCount = 800;
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 60;
                if (i % 3 === 1) positions[i] = Math.random() * 15 - 2;
                if (i % 3 === 2) positions[i] = -Math.random() * 50 - 10;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: 0xaaaadd,
                size: 0.08,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
            });
            const particles = new THREE.Points(geo, mat);
            scene.add(particles);
        }

        // --- ACTUALIZAR ÁRBOLES (bucle infinito) ---
        function updateTrees(distance) {
            const spacing = CONFIG.treeSpacing;
            const total = CONFIG.numTrees;
            const playerZ = -distance * 0.8;
            
            treeGroups.forEach((tree, index) => {
                const baseZ = -index * spacing - 2;
                let z = baseZ + playerZ;
                
                if (z > 3) z -= total * spacing;
                if (z < -total * spacing - 5) z += total * spacing;
                
                tree.position.set(tree.position.x, -0.5, z);
            });
        }

        // --- EFECTO BALDI ---
        function updateEyes() {
            const playerPos = new THREE.Vector3(0, 0, -state.distance * 0.8);
            
            treeGroups.forEach(tree => {
                const eyeL = tree.userData.eyeL;
                const eyeR = tree.userData.eyeR;
                if (!eyeL || !eyeR) return;
                
                const treePos = tree.position.clone();
                const dir = new THREE.Vector3().subVectors(playerPos, treePos);
                dir.y = 0;
                if (dir.length() > 0.01) dir.normalize();
                
                const angle = Math.atan2(dir.x, dir.z);
                eyeL.rotation.y = angle;
                eyeR.rotation.y = angle;
                
                const pupilL = tree.userData.pupilL;
                const pupilR = tree.userData.pupilR;
                if (pupilL && pupilR) {
                    const pupilOffset = 0.04;
                    const lookX = Math.sin(angle) * pupilOffset;
                    const lookZ = Math.cos(angle) * pupilOffset;
                    pupilL.position.set(lookX, 0, 0.02 + lookZ * 0.1);
                    pupilR.position.set(lookX, 0, 0.02 + lookZ * 0.1);
                }
            });
        }

        // --- MOVIMIENTO CON WASD ---
        function handleMovement(delta) {
            const speed = CONFIG.speed * state.speedMultiplier;
            let moving = false;
            
            // Movimiento en Z (adelante/atrás)
            if (state.keys.w) {
                state.distance += speed * delta * 30;
                moving = true;
            }
            if (state.keys.s) {
                state.distance -= speed * delta * 30;
                moving = true;
            }
            
            // Movimiento lateral (A/D) - efecto visual de balanceo
            if (state.keys.a) {
                camera.position.x -= speed * delta * 15;
                moving = true;
            }
            if (state.keys.d) {
                camera.position.x += speed * delta * 15;
                moving = true;
            }
            
            // Limitar movimiento lateral
            camera.position.x = Math.max(-3, Math.min(3, camera.position.x));
            
            // Truco de la escalera infinita
            if (state.distance >= CONFIG.maxDistance) {
                state.distance -= CONFIG.teleportOffset;
                state.loopCount += 1;
            }
            if (state.distance < 0) {
                state.distance = 0;
            }
            
            // Sonido de pasos
            if (moving) {
                state.stepTimer += delta;
                if (state.stepTimer >= CONFIG.stepInterval / state.speedMultiplier) {
                    state.stepTimer = 0;
                    state.steps++;
                    playStep();
                }
            } else {
                state.stepTimer = 0;
            }
            
            state.isWalking = moving;
            
            // Actualizar UI
            distDisplay.textContent = state.distance.toFixed(2);
            loopDisplay.textContent = state.loopCount;
            stepDisplay.textContent = state.steps;
            
            return moving;
        }

        // --- ANIMACIÓN ---
        let frameCount = 0;
        let lastFpsUpdate = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = state.clock.getDelta();
            frameCount++;
            
            // Movimiento
            handleMovement(delta);
            
            // Actualizar árboles
            updateTrees(state.distance);
            updateEyes();
            
            // Cámara
            const camZ = -state.distance * 0.8;
            camera.position.z = camZ + 6;
            camera.lookAt(camera.position.x * 0.3, 0.5, camZ - 10);
            
            // Cielo
            if (skyMesh) skyMesh.rotation.y += 0.0001;
            
            // FPS
            const time = performance.now();
            if (time - lastFpsUpdate > 1000) {
                lastFpsUpdate = time;
                frameCount = 0;
            }
            
            renderer.render(scene, camera);
        }

        // --- CONTROLES ---
        function setupControls() {
            // Teclado
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                    state.keys[key] = true;
                    e.preventDefault();
                }
                // Espacio para saltar (efecto visual)
                if (key === ' ') {
                    e.preventDefault();
                    // Pequeño salto visual
                    camera.position.y = 3.8;
                    setTimeout(() => camera.position.y = 3.2, 300);
                }
            });
            
            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                    state.keys[key] = false;
                    e.preventDefault();
                }
            });
            
            // Botones
            document.getElementById('resetBtn').addEventListener('click', () => {
                state.distance = 0;
                state.loopCount = 0;
                state.steps = 0;
                camera.position.x = 0;
            });
            
            document.getElementById('speedBtn').addEventListener('click', function() {
                if (state.speedMultiplier === 1) {
                    state.speedMultiplier = 2;
                    this.textContent = '⏩ x2';
                } else if (state.speedMultiplier === 2) {
                    state.speedMultiplier = 3;
                    this.textContent = '⏩ x3';
                } else {
                    state.speedMultiplier = 1;
                    this.textContent = '⏩ x1';
                }
            });
            
            document.getElementById('toggleMusicBtn').addEventListener('click', function() {
                const enabled = toggleMusic();
                this.textContent = enabled ? '🔊 Música' : '🔇 Silencio';
                this.classList.toggle('active', !enabled);
            });
            
            document.getElementById('toggleStepsBtn').addEventListener('click', function() {
                const enabled = toggleSteps();
                this.textContent = enabled ? '👣 Pasos' : '🔇 Pasos';
                this.classList.toggle('active', !enabled);
            });
            
            // Click para activar audio
            document.addEventListener('click', () => {
                if (musicAudio && musicEnabled) {
                    musicAudio.play().catch(() => {});
                }
            }, { once: true });
        }

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🌀 Dreamcore 3D - Camino Infinito');
        console.log('🎮 WASD para caminar · Espacio para saltar');
        console.log('👣 Sonido de pasos incluido');
        console.log('👁️ Árboles con efecto Baldi');
    </script>
</body>
</html>
