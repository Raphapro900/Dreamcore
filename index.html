<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ms. BananaS - Persecución Nocturna</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #FFD700;
      text-align: center;
      overflow: hidden;
    }
    #startScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #1a0a00, #3d1a00, #1f0f00, #2a1500);
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
      position: relative;
      z-index: 10;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .menuPanel {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border: 3px solid #FF6600;
      border-radius: 15px;
      box-shadow: 0 0 30px #ff3300;
      display: flex;
      flex-direction: row;
      gap: 40px;
      align-items: center;
      justify-content: center;
    }
    .menuBtn {
      font-size: 1.3em;
      padding: 15px 25px;
      margin: 10px;
      background: #1a0a00;
      color: #FF9900;
      border: 2px solid #FF6600;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      border-radius: 8px;
      font-family: monospace;
    }
    .menuBtn:hover { transform: scale(1.1); box-shadow: 0 0 15px #FF6600; background: #331100; }
    #bananaPlay {
      width: 180px;
      cursor: pointer;
      transition: transform .3s ease, filter .3s ease;
      animation: float 3s ease-in-out infinite;
      margin: 20px;
      filter: drop-shadow(0 0 10px #ffaa00);
    }
    #bananaPlay:hover { transform: scale(1.1) rotate(-5deg); filter: drop-shadow(0 0 20px #ffcc00); }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }
    footer { margin-top: 20px; font-size: .9em; color: #884400; }
    #infoBox {
      display: none;
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      padding: 20px;
      background: rgba(0,0,0,.9);
      color: #FF9900;
      border: 2px solid #FF6600;
      border-radius: 10px;
      z-index: 20;
    }
    #closeBtn { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 1.2em; color: #FF6600; }
    #gameScreen {
      display: none;
      width: 100%;
      height: 100vh;
      background: url('Room.png') center/cover no-repeat;
      position: relative;
    }
    #bananaGame { position: absolute; left: 10%; top: 50%; transform: translateY(-50%); width: 300px; animation: float 3s ease-in-out infinite; }
    #tv { position: absolute; left: 55%; top: 50%; transform: translate(-50%,-50%); width: 480px; height: 270px; background: black; border: 4px solid #333; box-shadow: 0 0 20px #000; }
    #animal { width: 100%; height: 100%; object-fit: contain; }
    .options { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .options button { font-size: 1.2em; padding: 10px 20px; background: #1a0a00; color: #FF9900; border: 2px solid #FF6600; cursor: pointer; font-family: monospace; }
    #dialogueBox { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 70%; padding: 15px; background: rgba(0,0,0,.8); color: #FFD700; font-size: 1.2em; border: 2px solid #FF6600; display: none; z-index: 15; }
    #rageText { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 1.5em; color: #ff4444; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 10px; font-weight: bold; }
    #dayText { position: absolute; top: 130px; left: 50%; transform: translateX(-50%); font-size: 1.3em; color: #FFAA44; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 10px; }
    #jumpscare { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }
    #jumpscare video { width: 100%; height: 100%; object-fit: cover; }

    /* Contenedor del juego 3D primera persona noche */
    #chaseContainer {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: #000;
      cursor: grab;
    }
    #chaseContainer:active { cursor: grabbing; }
    .chaseUI {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #ffaa33;
      font-family: monospace;
      font-size: 18px;
      background: rgba(0,0,0,0.7);
      padding: 8px 15px;
      border-radius: 8px;
      z-index: 1004;
      pointer-events: none;
      border-left: 3px solid #ff6600;
    }
    .distanceText {
      position: absolute;
      top: 20px;
      right: 20px;
      background: black;
      color: #ff6666;
      font-size: 22px;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: monospace;
      z-index: 1004;
      pointer-events: none;
      text-shadow: 0 0 5px red;
      border: 1px solid #ff3300;
    }
    .controlsHint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: #ffaa66;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 1004;
      font-family: monospace;
    }
    #screenShake {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1005;
      background: transparent;
      display: none;
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <h1 style="text-shadow: 0 0 10px #ff6600;">🍌 Ms. BananaS 🍌</h1>
    <div class="menuPanel">
      <img id="bananaPlay" src="banana.png" alt="Ms.BananaS">
      <div>
        <button class="menuBtn" id="howBtn">📖 How to Play</button><br>
        <button class="menuBtn" id="shopBtn">🛒 Shop</button><br>
        <button class="menuBtn" id="exitBtn">🚪 Exit</button>
      </div>
    </div>
    <audio id="menuMusic" src="bananamenu.mp3" autoplay loop></audio>
    <footer>©Raphapro900 2026 — Noche + Persecución Banana.jpg</footer>
    <div id="infoBox"><span id="closeBtn">✖</span><div id="infoContent"></div></div>
  </div>

  <div id="gameScreen">
    <audio id="roomMusic" src="Room Theme.mp3" loop></audio>
    <img id="bananaGame" src="banana.png" alt="Ms. BananaS">
    <div id="tv"><img id="animal" src="Seal.webp" alt="Animal"></div>
    <div class="options">
      <button>Seal</button><button>Dog</button><button>Cat</button>
      <button>Duck</button><button>Eagle</button><button>Snake</button>
    </div>
    <div id="dialogueBox"></div>
    <audio id="dialogueAudio"></audio>
    <div id="rageText">💢 Furia: 0</div>
    <div id="dayText">🌙 Día 1 — Animales: 0/15</div>
  </div>

  <div id="jumpscare">
    <video id="jumpscareVideo" src="jumpscare.mp4"></video>
  </div>

  <div id="chaseContainer">
    <canvas id="threeCanvas" style="width:100%;height:100%;display:block;"></canvas>
    <div id="screenShake"></div>
    <div class="chaseUI">🍌 ¡Te persigue Banana.jpg! Corre (WASD + SHIFT)</div>
    <div class="distanceText" id="distanceMeters">📏 Distancia: -- m</div>
    <div class="controlsHint">🎮 WASD mover | 🏃 SHIFT correr | 🖱️ Mouse mirar</div>
    <audio id="chaseMusic" src="chase.mp3" loop></audio>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // -------- Elementos y lógica del juego de adivinanzas ----------
    const bananaPlay = document.getElementById("bananaPlay");
    const howBtn = document.getElementById("howBtn");
    const shopBtn = document.getElementById("shopBtn");
    const exitBtn = document.getElementById("exitBtn");
    const infoBox = document.getElementById("infoBox");
    const infoContent = document.getElementById("infoContent");
    const closeBtn = document.getElementById("closeBtn");
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const menuMusic = document.getElementById("menuMusic");
    const roomMusic = document.getElementById("roomMusic");
    const animalImg = document.getElementById("animal");
    const dialogueBox = document.getElementById("dialogueBox");
    const dialogueAudio = document.getElementById("dialogueAudio");
    const rageText = document.getElementById("rageText");
    const dayText = document.getElementById("dayText");
    const jumpscareDiv = document.getElementById("jumpscare");
    const jumpscareVideo = document.getElementById("jumpscareVideo");
    const buttons = document.querySelectorAll(".options button");
    const chaseContainer = document.getElementById("chaseContainer");
    const chaseMusic = document.getElementById("chaseMusic");

    const animals = [
      { name: "Seal", file: "Seal.webp" },
      { name: "Dog", file: "Dog.jfif" },
      { name: "Cat", file: "Cat.jpj" },
      { name: "Duck", file: "Duck.avif" },
      { name: "Eagle", file: "Aguila.webp" },
      { name: "Snake", file: "Snake.jfif" }
    ];
    let currentAnimal = animals[0];
    let rage = 0;
    let day = 1;
    let correctCount = 0;
    const dayTargets = { 1: 15, 2: 22, 3: 31, 4: 39, 5: 46 };
    let gameActive = true;
    let falloTimer = null;

    function showDialogue(text, audioFile) {
      if (!gameActive) return;
      dialogueBox.innerText = text;
      dialogueBox.style.display = "block";
      dialogueAudio.src = audioFile;
      dialogueAudio.currentTime = 0;
      dialogueAudio.play().catch(e => console.log(e));
      dialogueAudio.onended = () => { if(gameActive) dialogueBox.style.display = "none"; };
    }

    function nextAnimal() {
      if (!gameActive) return;
      currentAnimal = animals[Math.floor(Math.random() * animals.length)];
      animalImg.src = currentAnimal.file;
      animalImg.alt = currentAnimal.name;
      buttons.forEach(btn => btn.style.backgroundColor = "#1a0a00");
    }

    function triggerJumpscareFinal() {
      jumpscareDiv.style.display = "block";
      jumpscareVideo.play();
      jumpscareVideo.onended = () => {
        window.location.href = "https://raw.githubusercontent.com/Raphapro900/Ms.BananaS/refs/heads/main/You%20know%20nothing%2C%20IDIOT.png";
      };
    }

    // ---------- JUEGO 3D PRIMERA PERSONA - NOCHE + BANANA.JPG CON EFECTO BALDI ----------
    let chaseActive = false;
    let chaseAnimationId = null;
    let scene, camera, renderer;
    let bananaMonster; // Sprite con textura banana.jpg
    let monsterPos = { x: 18, z: 12 };
    let playerPos = { x: 0, z: 0 };
    let playerAngle = 0; // ángulo de cámara
    let keys = { w: false, s: false, a: false, d: false, shift: false };
    let mouseX = 0, mouseY = 0;
    let pitch = 0, yaw = 0;
    let monsterSpeed = 2.6;
    let playerSpeed = 4.2;
    let runningMult = 1.0;
    let gameOverTriggered = false;
    let shakeIntensity = 0;
    let lastDistance = 20;

    // Efecto temblor pantalla
    const shakeDiv = document.getElementById("screenShake");
    function applyShake(intensity) {
      if (!chaseActive) return;
      const strength = Math.min(intensity, 12);
      const xShake = (Math.random() - 0.5) * strength;
      const yShake = (Math.random() - 0.5) * strength;
      if (renderer) {
        renderer.domElement.style.transform = `translate(${xShake}px, ${yShake}px)`;
      }
      setTimeout(() => {
        if (renderer && chaseActive) renderer.domElement.style.transform = "translate(0px, 0px)";
      }, 50);
    }

    // Textura de banana.jpg con efecto "siempre mirando al jugador" (sprite billboard)
    function initChaseGame() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020c1a); // noche oscura
      scene.fog = new THREE.FogExp2(0x020c1a, 0.045);
      
      // Cámara en primera persona
      camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.05, 200);
      camera.position.set(0, 1.8, 0); // Ajustar altura del jugador

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("threeCanvas"), antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;

      // Suelo noche pasto oscuro
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.9, metalness: 0.05 });
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.1;
      ground.receiveShadow = true;
      scene.add(ground);

      // Agregar árboles
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a2a1a });
      const foliageMat = new THREE.MeshStandardMaterial({ color: 0x1e4a1e });
      for (let i = 0; i < 30; i++) {
        const treeGroup = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1), trunkMat);
        trunk.position.y = 0.5;
        trunk.castShadow = true;
        const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1, 6), foliageMat);
        foliage.position.y = 1.5;
        treeGroup.add(trunk, foliage);
        let angle = Math.random() * Math.PI * 2;
        let radius = 30 + Math.random() * 30;
        let x = Math.cos(angle) * radius;
        let z = Math.sin(angle) * radius;
        treeGroup.position.set(x, 0, z);
        scene.add(treeGroup);
      }

      // Luces nocturnas (luna tenue)
      const ambientLight = new THREE.AmbientLight(0x222222);
      scene.add(ambientLight);
      const moonLight = new THREE.DirectionalLight(0xccaa88, 0.65);
      moonLight.position.set(15, 25, -10);
      moonLight.castShadow = true;
      moonLight.shadow.mapSize.width = 1024;
      moonLight.shadow.mapSize.height = 1024;
      scene.add(moonLight);
      const backLight = new THREE.PointLight(0x664422, 0.3);
      backLight.position.set(-5, 3, -8);
      scene.add(backLight);

      // Efecto niebla suave
      const hemiLight = new THREE.HemisphereLight(0x334433, 0x221100, 0.4);
      scene.add(hemiLight);

      // --- BANANA.JPG con técnica de Sprite (siempre mira al jugador como Baldi) ---
      const textureLoader = new THREE.TextureLoader();
      const bananaTexture = textureLoader.load("https://raw.githubusercontent.com/Raphapro900/Ms.BananaS/refs/heads/main/banana.jpg");
      const spriteMaterial = new THREE.SpriteMaterial({ map: bananaTexture, color: 0xffffff, transparent: true });
      bananaMonster = new THREE.Sprite(spriteMaterial);
      bananaMonster.scale.set(1.2, 1.2, 1);
      bananaMonster.position.set(monsterPos.x, 0.9, monsterPos.z);
      scene.add(bananaMonster);

      // Añadir pequeñas luciérnagas
      const fireflyMat = new THREE.PointsMaterial({ color: 0xffaa44, size: 0.08 });
      const fireflyCount = 200;
      const fireflyPositions = [];
      for (let i = 0; i < fireflyCount; i++) {
        fireflyPositions.push((Math.random() - 0.5) * 80, Math.random() * 3, (Math.random() - 0.5) * 80);
      }
      const fireflyGeo = new THREE.BufferGeometry();
      fireflyGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(fireflyPositions), 3));
      const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
      scene.add(fireflies);

      // Control de mouse para mirar en primera persona
      document.addEventListener('mousemove', (e) => {
        if (!chaseActive) return;
        const sensitivity = 0.002;
        yaw -= e.movementX * sensitivity;
        pitch -= e.movementY * sensitivity;
        pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
        camera.rotation.order = 'YXZ';
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;
      });

      // Controles teclado
      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'w') keys.w = true;
        if (key === 's') keys.s = true;
        if (key === 'a') keys.a = true;
        if (key === 'd') keys.d = true;
        if (key === 'shift') { keys.shift = true; runningMult = 1.9; playerSpeed = 4.2; }
        e.preventDefault();
      });
      window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'w') keys.w = false;
        if (key === 's') keys.s = false;
        if (key === 'a') keys.a = false;
        if (key === 'd') keys.d = false;
        if (key === 'shift') { keys.shift = false; runningMult = 1.0; playerSpeed = 4.2; }
      });

      // Bloquear click para capturar mouse
      chaseContainer.addEventListener('click', () => {
        chaseContainer.requestPointerLock = chaseContainer.requestPointerLock || chaseContainer.mozRequestPointerLock;
        chaseContainer.requestPointerLock();
      });
      document.addEventListener('pointerlockchange', lockChange);
      function lockChange() {
        if (document.pointerLockElement === chaseContainer) {
          document.addEventListener('mousemove', onMouseMove);
        } else {
          document.removeEventListener('mousemove', onMouseMove);
        }
      }
      function onMouseMove(e) {
        if (!chaseActive) return;
        const sens = 0.002;
        yaw -= e.movementX * sens;
        pitch -= e.movementY * sens;
        pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
        camera.rotation.order = 'YXZ';
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;
      }

      // Loop principal persecución
      let lastTime = performance.now();
      function updateChase() {
        if (!chaseActive) return;
        const now = performance.now();
        let delta = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        if (delta <= 0) delta = 0.016;

        const currentSpeed = playerSpeed * runningMult;
        let moveX = 0, moveZ = 0;
        if (keys.w) moveZ -= 1;
        if (keys.s) moveZ += 1;
        if (keys.a) moveX -= 1;
        if (keys.d) moveX += 1;
        if (moveX !== 0 || moveZ !== 0) {
          const len = Math.hypot(moveX, moveZ);
          moveX /= len;
          moveZ /= len;
          // Movimiento relativo a la dirección de la cámara (yaw)
          const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
          const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
          const deltaPos = forward.clone().multiplyScalar(moveZ * currentSpeed * delta);
          deltaPos.add(right.clone().multiplyScalar(moveX * currentSpeed * delta));
          playerPos.x += deltaPos.x;
          playerPos.z += deltaPos.z;
        }
        // Límites bosque
        playerPos.x = Math.min(Math.max(playerPos.x, -48), 48);
        playerPos.z = Math.min(Math.max(playerPos.z, -48), 48);
        camera.position.x = playerPos.x;
        camera.position.z = playerPos.z;

        // IA Banana.jpg: se acerca al jugador con velocidad escalable
        const dx = playerPos.x - monsterPos.x;
        const dz = playerPos.z - monsterPos.z;
        let distToPlayer = Math.hypot(dx, dz);
        const distanceMeters = distToPlayer.toFixed(1);
        document.getElementById("distanceMeters").innerHTML = `🍌 Distancia: ${distanceMeters} m`;

        // Temblor de pantalla según cercanía (más cerca = más tiembla)
        let newShake = 0;
        if (distToPlayer < 6) newShake = (6 - distToPlayer) * 1.2;
        newShake = Math.min(newShake, 9);
        if (newShake > 0.5) applyShake(newShake);

        // Velocidad del monstruo aumenta si está cerca
        let currentMonsterSpeed = monsterSpeed;
        if (distToPlayer < 5) currentMonsterSpeed = 3.9;
        else if (distToPlayer < 9) currentMonsterSpeed = 3.2;
        else currentMonsterSpeed = 2.5;

        if (distToPlayer > 0.6) {
          const moveDirX = dx / distToPlayer;
          const moveDirZ = dz / distToPlayer;
          monsterPos.x += moveDirX * currentMonsterSpeed * delta;
          monsterPos.z += moveDirZ * currentMonsterSpeed * delta;
        }
        bananaMonster.position.set(monsterPos.x, 0.85, monsterPos.z);

        // Cinemática de cámara al mirar a banana2.jpg
        if (distToPlayer <= 1.2 && !gameOverTriggered) {
          gameOverTriggered = true;
          chaseActive = false;
          if (chaseAnimationId) cancelAnimationFrame(chaseAnimationId);
          chaseMusic.pause();
          chaseContainer.style.display = "none";
          triggerJumpscareFinal();
          return;
        }

        // Actualizar posición de luciérnagas animación simple
        fireflies.rotation.y += 0.005;

        renderer.render(scene, camera);
        chaseAnimationId = requestAnimationFrame(updateChase);
      }

      // Resetear posición
      playerPos = { x: 0, z: 0 };
      monsterPos = { x: 16, z: 14 };
      yaw = 0;
      pitch = 0;
      camera.rotation.y = 0;
      camera.rotation.x = 0;
      camera.position.set(0, 1.8, 0); // Ajustar altura del jugador
      gameOverTriggered = false;
      runningMult = 1;
      lastTime = performance.now();
      updateChase();
    }

    function startChaseMinigame() {
      if (chaseActive) return;
      chaseActive = true;
      chaseContainer.style.display = "flex";
      // Reproducir chase.mp3 en loop
      chaseMusic.currentTime = 0;
      chaseMusic.loop = true;
      chaseMusic.play().catch(e => console.log("chase audio error", e));
      initChaseGame();
    }

    // Cuando se alcanza furia 10
    function onRageReachedTen() {
      if (!gameActive) return;
      gameActive = false;
      roomMusic.pause();
      gameScreen.style.display = "none";
      startChaseMinigame();
    }

    // Configurar eventos de respuesta de animales
    buttons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (!gameActive) return;
        if (btn.innerText === currentAnimal.name) {
          btn.style.backgroundColor = "#2a6a2a";
          correctCount++;
          dayText.innerText = "🌙 Día " + day + " — Animales: " + correctCount + "/" + dayTargets[day];
          showDialogue("✅ ¡Correcto!", "c1.mp3");
          if (correctCount >= dayTargets[day]) {
            showDialogue("✨ ¡Completaste el día " + day + "!", "c2.mp3");
            setTimeout(() => {
              gameScreen.style.display = "none";
              roomMusic.pause();
              menuMusic.currentTime = 0;
              menuMusic.play();
              startScreen.style.display = "flex";
              gameActive = true;
              rage = 0;
              correctCount = 0;
              rageText.innerText = "💢 Furia: 0";
              dayText.innerText = "🌙 Día 1 — Animales: 0/15";
            }, 4000);
          }
          setTimeout(nextAnimal, 2000);
        } else {
          btn.style.backgroundColor = "#882222";
          buttons.forEach(b => {
            if (b.innerText === currentAnimal.name) b.style.backgroundColor = "#aa6644";
          });
          rage++;
          rageText.innerText = "💢 Furia: " + rage;
          showDialogue("❌ ¡Fallaste!", "f1.mp3");
          if (rage >= 10) {
            onRageReachedTen();
          } else {
            setTimeout(nextAnimal, 2000);
          }
        }
      });
    });

    function resetGameScreenState() {
      gameActive = true;
      rage = 0;
      correctCount = 0;
      day = 1;
      rageText.innerText = "💢 Furia: 0";
      dayText.innerText = "🌙 Día 1 — Animales: 0/15";
      nextAnimal();
    }

    bananaPlay.addEventListener("click", () => {
      startScreen.style.display = "none";
      gameScreen.style.display = "block";
      menuMusic.pause();
      roomMusic.currentTime = 0;
      roomMusic.play();
      resetGameScreenState();
      showDialogue("🍌 Bienvenido... No falles...", "Primer dia.mp3");
    });

    howBtn.addEventListener("click", () => {
      infoBox.style.display = "block";
      infoContent.innerHTML = "<h2>📜 How to Play</h2><p>Elige el animal correcto en la tele. Cada fallo aumenta la FURIA. Al llegar a 10, entrarás en el BOSQUE NOCTURNO. Banana.jpg te perseguirá con efecto de pantalla que tiembla. Corre con WASD, SHIFT para sprint, mira con mouse. Si te alcanza → JUMPSCARE. ¡Sobrevive!</p>";
    });

    shopBtn.addEventListener("click", () => {
      infoBox.style.display = "block";
      infoContent.innerHTML = "<h2>🛒 Tienda</h2><p>Próximamente: Reductor de furia y linterna.</p>";
    });

    exitBtn.addEventListener("click", () => {
      window.close();
    });

    closeBtn.addEventListener("click", () => {
      infoBox.style.display = "none";
    });

    nextAnimal();
  </script>
</body>
</html>
