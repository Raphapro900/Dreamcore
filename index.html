<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DREAMCORE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #080518 0%, #000 100%);
      z-index: 100; transition: opacity 1s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.5em; color: #c8b4ff;
      text-shadow: 0 0 40px #9b6fff, 0 0 80px #6633cc;
      animation: glow 3s ease-in-out infinite;
      margin-bottom: 0.4em;
    }
    #overlay .sub {
      color: #6677aa; letter-spacing: 0.2em; font-size: 0.78rem;
      margin-bottom: 2.5em; text-align: center; line-height: 2.2;
    }
    #startBtn {
      padding: 13px 50px; background: transparent;
      border: 1px solid #c8b4ff44; color: #c8b4ff;
      font-family: 'Courier New', monospace; font-size: 0.85rem;
      letter-spacing: 0.35em; cursor: pointer; transition: all 0.4s; text-transform: uppercase;
    }
    #startBtn:hover { background: #c8b4ff0d; border-color: #c8b4ff; box-shadow: 0 0 30px #9b6fff33; }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 40px #9b6fff, 0 0 80px #6633cc; }
      50%      { text-shadow: 0 0 70px #c8b4ff, 0 0 140px #9b6fff; }
    }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 14px; height: 14px;
      pointer-events: none; z-index: 10; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(200,180,255,0.4);
    }
    #crosshair::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 1px; top: 50%; transform: translateY(-50%); }

    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #c8b4ff33; font-size: 0.6rem; letter-spacing: 0.2em;
      pointer-events: none; z-index: 10; display: none;
    }
    #paused {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5); z-index: 50;
      color: #c8b4ff77; font-size: 1.3rem; letter-spacing: 0.5em;
    }
    #paused.show { display: flex; }

    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%);
      pointer-events: none; z-index: 5; display: none;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>DREAMCORE</h1>
  <div class="sub">
    el bosque que no termina<br>
    <span style="color:#33224466;font-size:0.9em">explora · escucha · camina</span>
  </div>
  <button id="startBtn">[ entrar al sueño ]</button>
  <p style="margin-top:2.5rem;font-size:0.6rem;color:#33224488;letter-spacing:0.2em">
    WASD · mover &nbsp;|&nbsp; MOUSE · mirar &nbsp;|&nbsp; SHIFT · correr &nbsp;|&nbsp; ESC · pausar
  </p>
</div>

<div id="crosshair"></div>
<div id="hint">WASD · mover &nbsp;|&nbsp; SHIFT · correr &nbsp;|&nbsp; ESC · pausar</div>
<div id="vignette"></div>
<div id="paused">— PAUSA —</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
//  ASSETS — reemplaza REPO con tu usuario/repo de GitHub
//  Ejemplo: https://raw.githubusercontent.com/usuario/repo/main/
// ════════════════════════════════════════════════════════
const ASSETS = 'https://raw.githubusercontent.com/FranciscoFuentesT/dreamcore/main/';

// ── RENDERER ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// ── SCENE ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06021a, 0.020);

// ── CAMERA ────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.05, 300);
camera.position.set(0, 1.7, 0);

const canvas = renderer.domElement;
const euler  = new THREE.Euler(0, 0, 0, 'YXZ');
const PI2    = Math.PI / 2;
let locked   = false;
let gameStarted = false;

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === canvas;
  document.getElementById('crosshair').style.display = locked ? 'block' : 'none';
  document.getElementById('hint').style.display = locked ? 'block' : 'none';
  document.getElementById('vignette').style.display = locked ? 'block' : 'none';
  if (gameStarted)
    document.getElementById('paused').classList.toggle('show', !locked);
});

document.addEventListener('mousemove', e => {
  if (!locked) return;
  euler.setFromQuaternion(camera.quaternion);
  euler.y -= e.movementX * 0.002;
  euler.x  = Math.max(-PI2, Math.min(PI2, euler.x - e.movementY * 0.002));
  camera.quaternion.setFromEuler(euler);
});

// ── KEYS ──────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape' && gameStarted)
    locked ? document.exitPointerLock() : canvas.requestPointerLock();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── LIGHTS ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x12082e, 2.2));

const flashlight = new THREE.SpotLight(0xd4c8ff, 3, 40, Math.PI/9, 0.5, 1.5);
flashlight.castShadow = true;
scene.add(flashlight); scene.add(flashlight.target);

const moon = new THREE.DirectionalLight(0x8899cc, 0.4);
moon.position.set(-30, 80, -20);
scene.add(moon);

// Point lights atmosféricos
[
  [0x6633cc, 12, 15], [0x3355bb, -18, -10], [0xaa44cc, -8, 22],
  [0x4422aa, 25, -5],  [0x993388, -20, 30],  [0x224499, 30, 20],
].forEach(([color, x, z]) => {
  const pl = new THREE.PointLight(color, 0.6, 20);
  pl.position.set(x, 2, z);
  scene.add(pl);
});

// ── TEXTURAS ──────────────────────────────────────────────
const texLoader = new THREE.TextureLoader();

// Cielo (deamcore.jpg)
texLoader.load(ASSETS + 'deamcore.jpg', tex => {
  scene.background = tex;
}, undefined, () => {
  // fallback si no carga
  scene.background = new THREE.Color(0x06021a);
});

// Suelo (grass_ps1.jpg)
texLoader.load(ASSETS + 'grass_ps1.jpg', tex => {
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(60, 60);
  tex.magFilter = THREE.NearestFilter; // PS1 pixelado
  tex.minFilter = THREE.NearestFilter;
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(600, 600),
    new THREE.MeshLambertMaterial({ map: tex })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);
}, undefined, () => {
  // fallback procedural
  const cv = document.createElement('canvas'); cv.width = cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#0c1a08'; ctx.fillRect(0,0,128,128);
  for (let i=0;i<300;i++) {
    ctx.fillStyle=['#152b0b','#1a3510','#0d1a07'][i%3];
    ctx.fillRect(Math.random()*128, Math.random()*128, 2+Math.random()*4, 2+Math.random()*4);
  }
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(70,70);
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(600,600), new THREE.MeshLambertMaterial({map:t}));
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
});

// ── ÁRBOLES BILLBOARD (tree_ps1.png) ──────────────────────
// Como Baldi's Basics: PlaneGeometry que siempre mira a la cámara (lookAt horizontal)
const trees = [];
texLoader.load(ASSETS + 'tree_ps1.png', tex => {
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, side: THREE.DoubleSide, alphaTest: 0.1
  });
  for (let i = 0; i < 120; i++) {
    const s = 0.6 + Math.random() * 0.8;
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(6*s, 12*s), mat);
    let x, z;
    do { x = (Math.random()-0.5)*280; z = (Math.random()-0.5)*280; }
    while (Math.hypot(x, z) < 12);
    mesh.position.set(x, 6*s*0.5, z);
    scene.add(mesh);
    trees.push(mesh);
  }
}, undefined, () => {
  // Fallback: árbol procedural si no carga PNG
  const W=64, H=128, cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#3b2410'; ctx.fillRect(W/2-4,H*0.58,8,H*0.42);
  [[W/2,0,W*0.96,H*0.36,'#183d0f'],[W/2,H*0.22,W*0.8,H*0.30,'#1e4a14'],[W/2,H*0.40,W*0.64,H*0.26,'#255c1a']].forEach(([x,y,w,h,c])=>{
    ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-w/2,y+h); ctx.lineTo(x+w/2,y+h); ctx.closePath(); ctx.fill();
  });
  const t=new THREE.CanvasTexture(cv);
  const mat=new THREE.MeshBasicMaterial({map:t,transparent:true,side:THREE.DoubleSide,alphaTest:0.08});
  for(let i=0;i<100;i++){
    const s=0.7+Math.random()*0.9;
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(5*s,10*s),mat);
    let x,z; do{x=(Math.random()-0.5)*280;z=(Math.random()-0.5)*280;}while(Math.hypot(x,z)<12);
    mesh.position.set(x,5*s*0.5,z); scene.add(mesh); trees.push(mesh);
  }
});

// ── PILARES / RUINAS ──────────────────────────────────────
(function() {
  const mat = new THREE.MeshLambertMaterial({ color: 0x1a0e30 });
  for (let i=0; i<18; i++) {
    const h=3+Math.random()*8, r=0.3+Math.random()*0.35;
    const p=new THREE.Mesh(new THREE.CylinderGeometry(r,r*1.1,h,6),mat);
    const x=(Math.random()-0.5)*200, z=(Math.random()-0.5)*200;
    p.position.set(x,h/2,z); p.castShadow=true; scene.add(p);
    const cap=new THREE.Mesh(new THREE.BoxGeometry(r*3,0.25,r*3),mat);
    cap.position.set(x,h,z); scene.add(cap);
  }
})();

// ── ORBES DECORATIVOS ─────────────────────────────────────
const orbs = [];
(function() {
  const palette=[0xc8a8ff,0xff88cc,0x88ccff,0xffddaa,0xaaffee];
  for(let i=0;i<10;i++){
    const col=palette[i%palette.length];
    const m=new THREE.Mesh(new THREE.SphereGeometry(0.14+Math.random()*0.14,8,8), new THREE.MeshBasicMaterial({color:col}));
    m.position.set((Math.random()-0.5)*120, 1+Math.random()*3.5, (Math.random()-0.5)*120);
    const l=new THREE.PointLight(col,1.2,8); m.add(l);
    m.userData.offset=Math.random()*Math.PI*2;
    m.userData.baseY=m.position.y;
    scene.add(m); orbs.push(m);
  }
})();

// ── ESTRELLAS ─────────────────────────────────────────────
(function() {
  const N=2200, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2, ph=Math.acos(Math.random()*2-1), r=150+Math.random()*50;
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=Math.abs(r*Math.cos(ph))+5;
    pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:0.18,sizeAttenuation:true})));
})();

// ── AUDIO ─────────────────────────────────────────────────
let bgMusic   = null;    // HTMLAudioElement
let stepAudio = null;    // AudioBuffer para Web Audio
let actx      = null;
let stepCooldown = false;
// Intervalo entre pasos: ~380ms caminando, ~260ms corriendo
const STEP_WALK = 380;
const STEP_RUN  = 255;

function initAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();

  // Música de fondo via HTMLAudio (loop, sin pitch)
  bgMusic = new Audio(ASSETS + 'dreamcore.mp3');
  bgMusic.loop   = true;
  bgMusic.volume = 0.45;
  bgMusic.play().catch(() => {}); // autoplay guarded

  // Cargar buffer de pasos para pitch variable
  fetch(ASSETS + 'pasos.mp3')
    .then(r => r.arrayBuffer())
    .then(ab => actx.decodeAudioData(ab))
    .then(buf => { stepAudio = buf; })
    .catch(() => { stepAudio = null; });
}

function playStep(running) {
  if (!actx || stepCooldown) return;

  stepCooldown = true;
  setTimeout(() => { stepCooldown = false; }, running ? STEP_RUN : STEP_WALK);

  if (stepAudio) {
    // Pitch realista: variación ±8% → suena natural, ni chipmunk ni toro
    // 0.92 – 1.08 cubre el rango de peso/superficie sin exagerar
    const pitchVariance = 0.92 + Math.random() * 0.16;

    const source = actx.createBufferSource();
    source.buffer = stepAudio;
    source.playbackRate.value = pitchVariance;

    const gain = actx.createGain();
    // Volumen ligeramente aleatorio también (±10%) para realismo
    gain.gain.value = 0.7 + Math.random() * 0.2;

    source.connect(gain);
    gain.connect(actx.destination);
    source.start();
  }
}

// ── GAME LOOP ─────────────────────────────────────────────
const moveDir  = new THREE.Vector3();
const camDir   = new THREE.Vector3();
const camRight = new THREE.Vector3();
const clock    = new THREE.Clock();
let bobTime    = 0;

document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  gameStarted = true;
  const ov = document.getElementById('overlay');
  ov.classList.add('hidden');
  canvas.requestPointerLock();
});
canvas.addEventListener('click', () => {
  if (gameStarted && !locked) canvas.requestPointerLock();
});

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (locked && gameStarted) {
    const running = keys['ShiftLeft'] || keys['ShiftRight'];
    const speed   = running ? 7.5 : 4.0;
    let moving    = false;

    moveDir.set(0, 0, 0);
    camera.getWorldDirection(camDir); camDir.y = 0; camDir.normalize();
    camRight.crossVectors(camDir, camera.up).normalize();

    if (keys['KeyW']) { moveDir.addScaledVector(camDir,    1); moving = true; }
    if (keys['KeyS']) { moveDir.addScaledVector(camDir,   -1); moving = true; }
    if (keys['KeyA']) { moveDir.addScaledVector(camRight, -1); moving = true; }
    if (keys['KeyD']) { moveDir.addScaledVector(camRight,  1); moving = true; }

    if (moving) {
      moveDir.normalize();
      camera.position.addScaledVector(moveDir, speed * dt);
      playStep(running);

      // Headbob
      bobTime += dt * (running ? 10 : 6.5);
      camera.position.y = 1.7 + Math.sin(bobTime) * 0.038;
    } else {
      // Suave retorno a altura neutral
      camera.position.y += (1.7 - camera.position.y) * 0.15;
    }

    // Límite mundo
    camera.position.x = Math.max(-250, Math.min(250, camera.position.x));
    camera.position.z = Math.max(-250, Math.min(250, camera.position.z));
  }

  // Linterna
  flashlight.position.copy(camera.position);
  const fd = new THREE.Vector3();
  camera.getWorldDirection(fd);
  flashlight.target.position.copy(camera.position).addScaledVector(fd, 6);
  flashlight.target.updateMatrixWorld();

  // Árboles billboard — solo rotan en Y (como Baldi's Basics)
  trees.forEach(tr => {
    tr.lookAt(camera.position.x, tr.position.y, camera.position.z);
  });

  // Orbes flotantes
  orbs.forEach(o => {
    o.position.y = o.userData.baseY + Math.sin(t * 0.8 + o.userData.offset) * 0.5;
    o.rotation.y += dt * 0.4;
  });

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
