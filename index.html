<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dreamcore 3D Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/shaders/RGBShiftShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/shaders/FilmShader.js"></script>

<script>
  // Escena, cámara y render
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Cielo
  const loader = new THREE.TextureLoader();
  loader.load("deamcore.jpg", texture => {
    scene.background = texture;
  });

  // Linterna
  const flashlight = new THREE.SpotLight(0xffffff, 2, 50, Math.PI/6, 0.5, 2);
  flashlight.position.set(0, 2, 0);
  flashlight.target = camera;
  camera.add(flashlight);
  camera.add(flashlight.target);

  // Suelo con textura
  loader.load("grass_ps1.png", grassTex => {
    const floorGeometry = new THREE.PlaneGeometry(500, 500);
    const floorMaterial = new THREE.MeshLambertMaterial({ map: grassTex });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);
  });

  // Árboles estilo PS1 (billboards)
  const trees = [];
  loader.load("tree_ps1.png", treeTex => {
    const treeMaterial = new THREE.MeshBasicMaterial({
      map: treeTex,
      side: THREE.DoubleSide,
      transparent: true
    });
    for(let i=0; i<40; i++){
      const tree = new THREE.Mesh(new THREE.PlaneGeometry(10, 20), treeMaterial);
      tree.position.set(Math.random()*400-200, 10, Math.random()*400-200);
      scene.add(tree);
      trees.push(tree);
    }
  });

  // Controles
  const controls = new THREE.PointerLockControls(camera, document.body);
  document.body.addEventListener('click', () => controls.lock());
  camera.position.y = 2;

  let keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === "Escape") {
      alert("Has salido del juego");
      window.location.href = "about:blank"; // simula salir
    }
  });
  document.addEventListener('keyup', e => keys[e.code] = false);

  // Sonidos
  const listener = new THREE.AudioListener();
  camera.add(listener);
  const audioLoader = new THREE.AudioLoader();

  const bgSound = new THREE.Audio(listener);
  audioLoader.load("dreamcore.mp3", buffer => {
    bgSound.setBuffer(buffer);
    bgSound.setLoop(true);
    bgSound.setVolume(0.5);
    bgSound.play();
  });

  const stepSound = new THREE.Audio(listener);
  audioLoader.load("pasos.mp3", buffer => {
    stepSound.setBuffer(buffer);
    stepSound.setLoop(false);
    stepSound.setVolume(0.7);
  });

  // VHS efecto
  const composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  const filmPass = new THREE.ShaderPass(THREE.FilmShader);
  filmPass.uniforms['nIntensity'].value = 0.5;
  filmPass.uniforms['sIntensity'].value = 0.05;
  filmPass.uniforms['sCount'].value = 800;
  composer.addPass(filmPass);
  const rgbShift = new THREE.ShaderPass(THREE.RGBShiftShader);
  rgbShift.uniforms['amount'].value = 0.002;
  composer.addPass(rgbShift);

  // Animación principal
  function animate() {
    requestAnimationFrame(animate);

    // Movimiento del jugador
    if(keys["KeyW"]) { controls.moveForward(0.15); if(!stepSound.isPlaying) stepSound.play(); }
    if(keys["KeyS"]) { controls.moveForward(-0.15); if(!stepSound.isPlaying) stepSound.play(); }
    if(keys["KeyA"]) { controls.moveRight(-0.15); if(!stepSound.isPlaying) stepSound.play(); }
    if(keys["KeyD"]) { controls.moveRight(0.15); if(!stepSound.isPlaying) stepSound.play(); }

    // Billboard: árboles siempre mirando a la cámara
    trees.forEach(tree => {
      tree.lookAt(camera.position);
    });

    composer.render();
  }
  animate();
</script>
</body>
</html>
