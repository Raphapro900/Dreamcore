<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dreamcore Backrooms 3D</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/shaders/RGBShiftShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/shaders/FilmShader.js"></script>

<script>
  // Escena, cámara, render
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Cielo deamcore.jpg
  const loader = new THREE.TextureLoader();
  loader.load("deamcore.jpg", texture => {
    scene.background = texture;
  });

  // Luz
  const light = new THREE.PointLight(0xffffcc, 1, 100);
  light.position.set(0, 10, 0);
  scene.add(light);

  // Suelo
  const floorGeometry = new THREE.PlaneGeometry(500, 500);
  const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x222222 });
  const floor = new THREE.Mesh(floorGeometry, floorMaterial);
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Árboles estilo PS1
  loader.load("tree_ps1.png", treeTex => {
    const treeMaterial = new THREE.MeshBasicMaterial({ map: treeTex, side: THREE.DoubleSide });
    for(let i=0; i<20; i++){
      const tree = new THREE.Mesh(new THREE.PlaneGeometry(10, 20), treeMaterial);
      tree.position.set(Math.random()*400-200, 10, Math.random()*400-200);
      scene.add(tree);
    }
  });

  // Controles
  const controls = new THREE.PointerLockControls(camera, document.body);
  document.body.addEventListener('click', () => controls.lock());
  camera.position.y = 2;

  let keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === "Escape") window.close(); // salir con ESC
  });
  document.addEventListener('keyup', e => keys[e.code] = false);

  // Sonidos
  const listener = new THREE.AudioListener();
  camera.add(listener);

  const bgSound = new THREE.Audio(listener);
  const audioLoader = new THREE.AudioLoader();
  audioLoader.load("dreamcore.mp3", buffer => {
    bgSound.setBuffer(buffer);
    bgSound.setLoop(true);
    bgSound.setVolume(0.5);
    bgSound.play();
  });

  const stepSound = new THREE.Audio(listener);
  audioLoader.load("pasos.mp3", buffer => {
    stepSound.setBuffer(buffer);
    stepSound.setLoop(false);
    stepSound.setVolume(0.7);
  });

  // VHS efecto
  const composer = new THREE.EffectComposer(renderer);
  const renderPass = new THREE.RenderPass(scene, camera);
  composer.addPass(renderPass);

  const filmPass = new THREE.ShaderPass(THREE.FilmShader);
  filmPass.uniforms['grayscale'].value = 0;
  filmPass.uniforms['nIntensity'].value = 0.5;
  filmPass.uniforms['sIntensity'].value = 0.05;
  filmPass.uniforms['sCount'].value = 800;
  composer.addPass(filmPass);

  const rgbShift = new THREE.ShaderPass(THREE.RGBShiftShader);
  rgbShift.uniforms['amount'].value = 0.002;
  composer.addPass(rgbShift);

  // Movimiento
  function animate() {
    requestAnimationFrame(animate);

    if(keys["KeyW"]) { controls.moveForward(0.1); stepSound.play(); }
    if(keys["KeyS"]) { controls.moveForward(-0.1); stepSound.play(); }
    if(keys["KeyA"]) { controls.moveRight(-0.1); stepSound.play(); }
    if(keys["KeyD"]) { controls.moveRight(0.1); stepSound.play(); }

    composer.render();
  }
  animate();
</script>
</body>
</html>
