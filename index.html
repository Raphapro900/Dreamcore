<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DREAMCORE - Bosque Onírico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; position: fixed; top: 0; left: 0; }

    /* Overlay de inicio */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0a0a2a 0%, #000 100%);
      z-index: 200; transition: opacity 1.5s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.5em; color: #c8b4ff;
      text-shadow: 0 0 40px #9b6fff, 0 0 80px #6633cc;
      animation: glow 3s ease-in-out infinite;
      margin-bottom: 0.4em;
    }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 40px #9b6fff, 0 0 80px #6633cc; }
      50% { text-shadow: 0 0 70px #c8b4ff, 0 0 140px #9b6fff; }
    }
    #overlay .sub {
      color: #8899cc; letter-spacing: 0.2em; font-size: 0.78rem;
      margin-bottom: 2.5em; text-align: center;
    }
    #startBtn {
      padding: 13px 50px; background: transparent;
      border: 1.5px solid #c8b4ff66; color: #c8b4ff;
      font-family: 'Courier New', monospace; font-size: 0.85rem;
      letter-spacing: 0.35em; cursor: pointer; transition: all 0.4s;
    }
    #startBtn:hover { background: #c8b4ff1a; border-color: #c8b4ff; box-shadow: 0 0 30px #9b6fff55; }

    /* UI */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 18px; height: 18px;
      pointer-events: none; z-index: 100; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(200,180,255,0.7);
    }
    #crosshair::before { width: 1.5px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after { width: 100%; height: 1.5px; top: 50%; transform: translateY(-50%); }

    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #c8b4ff88; font-size: 0.6rem; letter-spacing: 0.2em;
      pointer-events: none; z-index: 100; display: none;
      background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 40px;
      white-space: nowrap;
    }

    /* Pantalla de salida */
    #exitScreen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
      z-index: 300;
      font-family: 'Courier New', monospace;
      text-align: center;
    }
    #exitScreen.show { display: flex; }
    #exitScreen h1 { color: #c8b4ff; font-size: 2rem; letter-spacing: 0.3em; margin-bottom: 1rem; text-shadow: 0 0 20px #9b6fff; }
    #exitScreen p { color: #8899aa; font-size: 0.8rem; letter-spacing: 0.2em; }

    /* ============================================ */
    /* EFECTO VHS - ESTILO AMANDA THE ADVENTURER    */
    /* ============================================ */
    
    .vhs-vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 90; display: none;
    }
    
    .vhs-scanlines {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 91;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 5px);
      opacity: 0.6;
    }
    
    .vhs-chromatic {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 92;
    }
    .vhs-chromatic-red {
      position: absolute; inset: -2px;
      background: rgba(255, 0, 0, 0.1);
      mix-blend-mode: screen;
      pointer-events: none;
    }
    .vhs-chromatic-blue {
      position: absolute; inset: -2px;
      background: rgba(0, 255, 255, 0.1);
      mix-blend-mode: screen;
      pointer-events: none;
    }
    
    .vhs-noise {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 93;
      opacity: 0.2;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjkiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg==');
      background-repeat: repeat;
      background-size: 200px;
      animation: noiseAnim 0.2s steps(2) infinite;
    }
    
    .vhs-glitch {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 94;
      background: rgba(0,0,0,0);
      animation: glitchFlicker 0.12s infinite;
    }
    
    .vhs-tracking {
      position: fixed;
      left: 0;
      right: 0;
      height: 6px;
      background: rgba(255,255,255,0.3);
      pointer-events: none;
      z-index: 95;
      box-shadow: 0 0 10px rgba(255,255,200,0.5);
      animation: trackingSlide 2s linear infinite;
    }
    .vhs-tracking:nth-child(1) { top: 15%; animation-duration: 2.5s; height: 8px; background: rgba(255,200,100,0.4); }
    .vhs-tracking:nth-child(2) { top: 45%; animation-duration: 1.8s; height: 5px; background: rgba(255,100,150,0.3); }
    .vhs-tracking:nth-child(3) { top: 70%; animation-duration: 3.2s; height: 10px; background: rgba(100,200,255,0.4); }
    .vhs-tracking:nth-child(4) { top: 85%; animation-duration: 1.2s; height: 4px; background: rgba(255,255,255,0.5); }
    
    .vhs-bars {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 6px;
      background: rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 96;
    }
    .vhs-bars.left { left: 0; }
    .vhs-bars.right { right: 0; }
    
    @keyframes noiseAnim {
      0% { background-position: 0 0; opacity: 0.15; }
      25% { background-position: 25% 50%; opacity: 0.25; }
      50% { background-position: 50% 100%; opacity: 0.2; }
      75% { background-position: 75% 25%; opacity: 0.28; }
      100% { background-position: 100% 0; opacity: 0.18; }
    }
    
    @keyframes glitchFlicker {
      0%, 100% { background: rgba(0,0,0,0); }
      2% { background: rgba(255,255,255,0.15); }
      4% { background: rgba(0,0,0,0.1); }
      6% { background: rgba(255,0,0,0.08); }
      8% { background: rgba(0,0,0,0); }
      50% { background: rgba(0,0,0,0); }
      52% { background: rgba(0,255,255,0.08); }
      54% { background: rgba(0,0,0,0.15); }
      56% { background: rgba(0,0,0,0); }
    }
    
    @keyframes trackingSlide {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(100%); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>DREAMCORE</h1>
  <div class="sub">◆ el bosque que no termina ◆</div>
  <button id="startBtn">[ entrar al sueño ]</button>
  <p style="margin-top:2.5rem;font-size:0.6rem;color:#443366aa;letter-spacing:0.2em">
    WASD · mover | MOUSE · mirar | SHIFT · correr | ESC · salir
  </p>
</div>

<div id="exitScreen">
  <h1>✦ HAS SALIDO DEL SUEÑO ✦</h1>
  <p>Recarga la página para volver al bosque</p>
</div>

<div id="crosshair"><div class="dot"></div></div>
<div id="hint">WASD · mover | SHIFT · correr | ESC · salir</div>

<!-- Capas VHS -->
<div class="vhs-vignette" id="vignette"></div>
<div class="vhs-scanlines"></div>
<div class="vhs-chromatic">
  <div class="vhs-chromatic-red" id="chromaRed"></div>
  <div class="vhs-chromatic-blue" id="chromaBlue"></div>
</div>
<div class="vhs-noise"></div>
<div class="vhs-glitch"></div>
<div class="vhs-tracking"></div>
<div class="vhs-tracking"></div>
<div class="vhs-tracking"></div>
<div class="vhs-tracking"></div>
<div class="vhs-bars left"></div>
<div class="vhs-bars right"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// ASSETS - GitHub
// ============================================================
const ASSETS_BASE = 'https://raw.githubusercontent.com/FranciscoFuentesT/dreamcore/main/';

// ------------------------------------------------------------
// RENDERER
// ------------------------------------------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ------------------------------------------------------------
// ESCENA Y CÁMARA
// ------------------------------------------------------------
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.08, 320);
camera.position.set(0, 1.75, 0);

// Controles
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const PI2 = Math.PI / 2;
let locked = false;
let gameStarted = false;

// ESC - sale de la página
document.addEventListener('keydown', (e) => {
  if (e.code === 'Escape' && gameStarted) {
    if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; }
    if (audioContext) { audioContext.close(); }
    document.getElementById('exitScreen').classList.add('show');
    if (locked) document.exitPointerLock();
    renderer.domElement.style.display = 'none';
    document.getElementById('crosshair').style.display = 'none';
    document.getElementById('hint').style.display = 'none';
    document.getElementById('vignette').style.display = 'none';
    gameStarted = false;
    try { window.close(); } catch(e) {}
  }
});

// Pointer lock
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  document.getElementById('crosshair').style.display = locked ? 'block' : 'none';
  document.getElementById('hint').style.display = locked ? 'block' : 'none';
  document.getElementById('vignette').style.display = locked ? 'block' : 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!locked) return;
  euler.setFromQuaternion(camera.quaternion);
  euler.y -= e.movementX * 0.0022;
  euler.x = Math.max(-PI2, Math.min(PI2, euler.x - e.movementY * 0.0022));
  camera.quaternion.setFromEuler(euler);
});

// Teclado
const keys = {};
document.addEventListener('keydown', (e) => { keys[e.code] = true; });
document.addEventListener('keyup', (e) => { keys[e.code] = false; });

// ------------------------------------------------------------
// LUCES
// ------------------------------------------------------------
scene.add(new THREE.AmbientLight(0x8cb0d9, 1.2));

const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
sunLight.position.set(50, 80, -30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
scene.add(sunLight);

// ------------------------------------------------------------
// CIELO - deamcore.jpg
// ------------------------------------------------------------
const texLoader = new THREE.TextureLoader();
texLoader.load(ASSETS_BASE + 'deamcore.jpg', 
  (tex) => { scene.background = tex; tex.mapping = THREE.EquirectangularMapping; },
  undefined,
  () => { scene.background = new THREE.Color(0x87CEEB); }
);

// ------------------------------------------------------------
// SUELO - grass_ps1.jpg
// ------------------------------------------------------------
texLoader.load(ASSETS_BASE + 'grass_ps1.jpg', 
  (tex) => {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(60, 60);
    tex.magFilter = THREE.NearestFilter;
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(600, 600),
      new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
  },
  undefined,
  () => {
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(600, 600),
      new THREE.MeshStandardMaterial({ color: 0x5a8f4c })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
  }
);

// ------------------------------------------------------------
// ÁRBOLES - tree_ps1.png (billboard)
// ------------------------------------------------------------
const trees = [];
texLoader.load(ASSETS_BASE + 'tree_ps1.png',
  (tex) => {
    tex.magFilter = THREE.NearestFilter;
    const treeMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, alphaTest: 0.1 });
    for (let i = 0; i < 180; i++) {
      const scale = 0.8 + Math.random() * 0.9;
      const tree = new THREE.Mesh(new THREE.PlaneGeometry(5.5 * scale, 11 * scale), treeMat);
      let x, z;
      do { x = (Math.random() - 0.5) * 280; z = (Math.random() - 0.5) * 280; }
      while (Math.hypot(x, z) < 12);
      tree.position.set(x, 5.2 * scale, z);
      scene.add(tree);
      trees.push(tree);
    }
    console.log("✅ Árboles cargados:", trees.length);
  },
  undefined,
  () => { console.warn("❌ tree_ps1.png no cargado"); }
);

// ------------------------------------------------------------
// DECORACIONES
// ------------------------------------------------------------
// Piedras
for (let i = 0; i < 150; i++) {
  const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15), new THREE.MeshStandardMaterial({ color: 0x8a8a7a }));
  rock.position.set((Math.random() - 0.5) * 280, 0.1, (Math.random() - 0.5) * 280);
  rock.scale.set(1, Math.random() * 0.6 + 0.3, 1);
  rock.castShadow = true;
  if (Math.hypot(rock.position.x, rock.position.z) > 8) scene.add(rock);
}

// Partículas (polen/magia)
const particleCount = 600;
const particleGeo = new THREE.BufferGeometry();
const particlePos = [];
for (let i = 0; i < particleCount; i++) {
  particlePos.push((Math.random() - 0.5) * 300);
  particlePos.push(Math.random() * 5);
  particlePos.push((Math.random() - 0.5) * 280);
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePos), 3));
const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0xffdd99, size: 0.06, transparent: true, opacity: 0.4 }));
scene.add(particles);

// ------------------------------------------------------------
// AUDIO
// ------------------------------------------------------------
let audioContext = null;
let bgMusic = null;
let stepBuffer = null;
let stepCooldown = false;
const STEP_WALK = 380;
const STEP_RUN = 250;

function initAudio() {
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // Música loop
    bgMusic = new Audio(ASSETS_BASE + 'dreamcore.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.45;
    bgMusic.play().catch(e => console.log("Autoplay bloqueado"));
    
    // Pasos
    fetch(ASSETS_BASE + 'pasos.mp3')
      .then(res => res.arrayBuffer())
      .then(buf => audioContext.decodeAudioData(buf))
      .then(decoded => { stepBuffer = decoded; console.log("✅ pasos.mp3 cargado"); })
      .catch(err => console.warn("❌ pasos.mp3:", err));
  } catch(e) { console.warn("Web Audio error", e); }
}

function playStep(running) {
  if (!audioContext || !stepBuffer || stepCooldown) return;
  stepCooldown = true;
  setTimeout(() => { stepCooldown = false; }, running ? STEP_RUN : STEP_WALK);
  
  const source = audioContext.createBufferSource();
  source.buffer = stepBuffer;
  source.playbackRate.value = 0.85 + Math.random() * 0.3;
  const gain = audioContext.createGain();
  gain.gain.value = 0.5 + Math.random() * 0.2;
  source.connect(gain);
  gain.connect(audioContext.destination);
  source.start();
}

// ------------------------------------------------------------
// GAME LOOP
// ------------------------------------------------------------
const moveDir = new THREE.Vector3();
const forward = new THREE.Vector3();
const right = new THREE.Vector3();
let bobTime = 0;
let vhsTime = 0;

function updateMovement(dt) {
  if (!locked || !gameStarted) return;
  
  const running = keys['ShiftLeft'] || keys['ShiftRight'];
  const speed = running ? 7.2 : 4.2;
  let moving = false;
  
  moveDir.set(0, 0, 0);
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  right.crossVectors(forward, camera.up).normalize();
  
  if (keys['KeyW']) { moveDir.addScaledVector(forward, 1); moving = true; }
  if (keys['KeyS']) { moveDir.addScaledVector(forward, -1); moving = true; }
  if (keys['KeyA']) { moveDir.addScaledVector(right, -1); moving = true; }
  if (keys['KeyD']) { moveDir.addScaledVector(right, 1); moving = true; }
  
  if (moving) {
    moveDir.normalize();
    camera.position.addScaledVector(moveDir, speed * dt);
    playStep(running);
    
    bobTime += dt * (running ? 11 : 7.5);
    camera.position.y = 1.72 + Math.sin(bobTime) * 0.035;
  } else {
    camera.position.y += (1.72 - camera.position.y) * 0.12;
  }
  
  camera.position.x = Math.min(270, Math.max(-270, camera.position.x));
  camera.position.z = Math.min(270, Math.max(-270, camera.position.z));
}

function updateBillboards() {
  const camPos = camera.position;
  trees.forEach(tree => { if(tree) tree.lookAt(camPos.x, tree.position.y, camPos.z); });
}

function updateVHS(dt) {
  vhsTime += dt;
  const redLayer = document.getElementById('chromaRed');
  const blueLayer = document.getElementById('chromaBlue');
  if (redLayer && blueLayer && locked) {
    const shiftX = Math.sin(vhsTime * 40) * 3 + Math.cos(vhsTime * 28) * 1.5;
    const shiftY = Math.cos(vhsTime * 35) * 2;
    redLayer.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
    blueLayer.style.transform = `translate(${-shiftX * 0.9}px, ${-shiftY * 0.6}px)`;
  }
}

// ------------------------------------------------------------
// INICIO
// ------------------------------------------------------------
document.getElementById('startBtn').addEventListener('click', () => {
  if (gameStarted) return;
  initAudio();
  gameStarted = true;
  document.getElementById('overlay').classList.add('hidden');
  renderer.domElement.style.display = 'block';
  setTimeout(() => renderer.domElement.requestPointerLock(), 200);
});

renderer.domElement.addEventListener('click', () => {
  if (gameStarted && !locked) renderer.domElement.requestPointerLock();
});

// ------------------------------------------------------------
// ANIMACIÓN PRINCIPAL
// ------------------------------------------------------------
let lastTime = performance.now();
function animate() {
  const now = performance.now();
  let dt = Math.min(0.033, (now - lastTime) / 1000);
  lastTime = now;
  
  if (gameStarted) {
    updateMovement(dt);
    updateBillboards();
    updateVHS(dt);
    particles.rotation.y += 0.003;
  }
  
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

console.log("🌲 DREAMCORE iniciado | Assets:", ASSETS_BASE);
console.log("📁 Archivos necesarios: dreamcore.mp3, deamcore.jpg, grass_ps1.jpg, tree_ps1.png, pasos.mp3");
</script>
</body>
</html>
