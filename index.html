<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamcore · Camino Infinito (Primera Persona)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 12px 28px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 35px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            user-select: none;
        }
        #hud span {
            color: #ffd700;
            font-weight: 700;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            opacity: 0.3;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.6);
        }
        #crosshair::before {
            width: 2px;
            height: 18px;
            top: -9px;
            left: -1px;
        }
        #crosshair::after {
            width: 18px;
            height: 2px;
            top: -1px;
            left: -9px;
        }

        #controls-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 13px;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 6px 18px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.04);
            pointer-events: none;
            white-space: nowrap;
            user-select: none;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a12;
            z-index: 100;
            color: white;
            font-size: 22px;
        }
        #loading .spinner {
            font-size: 50px;
            animation: spin 1.2s ease-in-out infinite;
            margin-bottom: 20px;
        }
        #loading .sub {
            font-size: 14px;
            opacity: 0.4;
            margin-top: 10px;
        }
        #loading .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        #loading .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            border-radius: 4px;
            transition: width 0.3s;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .fade-out {
            animation: fadeOut 0.6s forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; pointer-events: none; }
        }

        #loop-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 20;
            color: #ffd700;
            font-size: 48px;
            font-weight: 800;
            pointer-events: none;
            opacity: 0;
            text-shadow: 0 0 40px rgba(255,215,0,0.3);
        }
        #loop-notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: pulse 0.8s ease-out forwards;
        }
        @keyframes pulse {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        @media (max-width: 600px) {
            #hud {
                font-size: 13px;
                padding: 8px 16px;
                gap: 18px;
                bottom: 20px;
                flex-wrap: wrap;
                justify-content: center;
                width: 90%;
            }
            #controls-hint {
                display: none;
            }
            #loop-notification {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner">🌀</div>
        <div>Cargando Dreamcore...</div>
        <div class="sub">Haz clic para comenzar</div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    </div>

    <div id="crosshair"></div>

    <div id="hud">
        <div>🚶 <span id="distDisplay">0.00</span> km</div>
        <div>🔄 <span id="loopDisplay">0</span></div>
        <div>👣 <span id="stepDisplay">0</span></div>
        <div>⚡ <span id="speedDisplay">1</span>x</div>
    </div>

    <div id="controls-hint">S · Adelante · W · Atrás · Mouse · Mirar · Espacio · Saltar</div>

    <div id="loop-notification">🌀 BUCLE #<span id="loopNotifCount">0</span></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURACIÓN ---
        const CONFIG = {
            maxDistance: 10.0,
            teleportOffset: 7.0,
            walkSpeed: 0.045,
            treeSpacing: 2.2,
            numTrees: 140,
            stepInterval: 0.35,
            mouseSensitivity: 0.002,
        };

        // --- ESTADO ---
        const state = {
            distance: 0,
            loopCount: 0,
            speedMultiplier: 1,
            steps: 0,
            stepTimer: 0,
            isWalking: false,
            keys: { s: false, w: false, a: false, d: false }, // S = adelante, W = atrás
            euler: new THREE.Euler(0, 0, 0, 'YXZ'),
            clock: new THREE.Clock(),
            trees: [],
        };

        // --- DOM REFS ---
        const distDisplay = document.getElementById('distDisplay');
        const loopDisplay = document.getElementById('loopDisplay');
        const stepDisplay = document.getElementById('stepDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        const loopNotif = document.getElementById('loop-notification');
        const loopNotifCount = document.getElementById('loopNotifCount');
        const loadingDiv = document.getElementById('loading');
        const progressFill = document.getElementById('progressFill');

        // --- ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d0d1a);
        scene.fog = new THREE.FogExp2(0x0d0d1a, 0.006);

        // --- CÁMARA ---
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 1.6, 0);

        // --- RENDER ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.prepend(renderer.domElement);

        // --- CARGAR TEXTURAS ---
        const textureLoader = new THREE.TextureLoader();
        let skyTexture, grassTexture, treeTexture;
        let loadProgress = 0;

        function updateProgress() {
            loadProgress += 1 / 3;
            progressFill.style.width = Math.min(loadProgress * 100, 100) + '%';
            if (loadProgress >= 1) {
                setTimeout(() => {
                    loadingDiv.classList.add('fade-out');
                    setTimeout(() => loadingDiv.remove(), 600);
                }, 300);
                initScene();
            }
        }

        function loadTexture(url, fallbackColor) {
            return new Promise((resolve) => {
                textureLoader.load(
                    url,
                    (tex) => {
                        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                        resolve(tex);
                        updateProgress();
                    },
                    undefined,
                    () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 64;
                        canvas.height = 64;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = fallbackColor || '#3a5a3a';
                        ctx.fillRect(0, 0, 64, 64);
                        const tex = new THREE.CanvasTexture(canvas);
                        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                        resolve(tex);
                        updateProgress();
                    }
                );
            });
        }

        const skyPromise = loadTexture('dreamcore.jpg', '#1a1a3a');
        const grassPromise = loadTexture('grass_ps1.png', '#4a7a4a');
        const treePromise = loadTexture('tree_ps1.png', '#5a8a5a');

        let assetsReady = false;
        Promise.all([skyPromise, grassPromise, treePromise]).then(([sky, grass, tree]) => {
            skyTexture = sky;
            grassTexture = grass;
            treeTexture = tree;
            assetsReady = true;
        });

        // --- AUDIO ---
        let stepAudio, musicAudio;
        let stepEnabled = true;
        let musicEnabled = true;

        function loadAudio() {
            try {
                stepAudio = new Audio('pasos.mp3');
                stepAudio.volume = 0.25;
                stepAudio.load();
                musicAudio = new Audio('dreamcore.mp3');
                musicAudio.loop = true;
                musicAudio.volume = 0.35;
                musicAudio.load();
            } catch (e) { console.log('Audio no disponible'); }
        }

        function playStep() {
            if (!stepEnabled || !stepAudio) return;
            try { stepAudio.currentTime = 0; stepAudio.play().catch(() => {}); } catch (e) {}
        }

        // --- ESCENA 3D ---
        let skyMesh, groundMesh;
        let treeGroups = [];

        function createSky() {
            const geo = new THREE.SphereGeometry(90, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 15;
            scene.add(mesh);
            return mesh;
        }

        function createGround() {
            const geo = new THREE.PlaneGeometry(300, 300);
            const mat = new THREE.MeshStandardMaterial({
                map: grassTexture,
                roughness: 0.9,
                metalness: 0.0,
                side: THREE.DoubleSide,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.y = -0.5;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // --- ÁRBOL CON EFECTO BALDI 2D (siempre mirando al jugador) ---
        function createTree(pos) {
            const group = new THREE.Group();

            // Tronco 3D
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.16, 0.7, 5),
                new THREE.MeshStandardMaterial({ color: 0x5a3d2b, roughness: 0.9 })
            );
            trunk.position.y = 0.35;
            trunk.castShadow = true;
            group.add(trunk);

            // --- Copa 2D (billboard) con tree_ps1.png ---
            // Siempre mira al jugador (efecto Baldi)
            const leafGeo = new THREE.PlaneGeometry(1.4, 1.4);
            const leafMat = new THREE.MeshStandardMaterial({
                map: treeTexture,
                transparent: true,
                side: THREE.DoubleSide,
                roughness: 0.5,
                metalness: 0.0,
                alphaTest: 0.1,
            });
            const leaves = new THREE.Mesh(leafGeo, leafMat);
            leaves.position.y = 1.0;
            leaves.castShadow = false;
            group.add(leaves);

            // --- OJOS (también 2D billboard) ---
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });

            const makeEye = (xOff) => {
                const g = new THREE.Group();
                // Ojo blanco
                const white = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 0.2), eyeMat);
                white.position.z = 0.01;
                // Pupila
                const pupil = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 0.11), pupilMat);
                pupil.position.z = 0.02;
                g.add(white);
                g.add(pupil);
                g.position.set(xOff, 1.15, 0.7);
                group.add(g);
                return { group: g, pupil };
            };

            const eyeL = makeEye(-0.2);
            const eyeR = makeEye(0.2);

            // Guardar referencias para actualizar la mirada
            group.userData = { 
                eyeL, 
                eyeR, 
                leaves,
                isBillboard: true 
            };

            group.position.copy(pos);
            group.castShadow = true;
            scene.add(group);
            return group;
        }

        function generateTreePositions() {
            const positions = [];
            const total = CONFIG.numTrees;
            for (let i = 0; i < total; i++) {
                const z = -i * CONFIG.treeSpacing - 3;
                const x = (Math.random() - 0.5) * 4.5;
                positions.push(new THREE.Vector3(x, -0.5, z));
            }
            return positions;
        }

        function createAtmosphere() {
            const count = 600;
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 70;
                if (i % 3 === 1) pos[i] = Math.random() * 12 - 1;
                if (i % 3 === 2) pos[i] = -Math.random() * 60 - 10;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({
                color: 0x8888bb,
                size: 0.06,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending,
            });
            scene.add(new THREE.Points(geo, mat));
        }

        // --- INICIALIZAR ---
        function initScene() {
            skyMesh = createSky();
            groundMesh = createGround();
            createAtmosphere();

            // Luces
            const ambient = new THREE.AmbientLight(0x404070, 0.5);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffeedd, 1.6);
            sun.position.set(15, 25, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 60;
            sun.shadow.camera.left = -25;
            sun.shadow.camera.right = 25;
            sun.shadow.camera.top = 25;
            sun.shadow.camera.bottom = -25;
            scene.add(sun);

            const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
            fill.position.set(-10, 5, -10);
            scene.add(fill);

            const hemi = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.4);
            scene.add(hemi);

            // Árboles
            const positions = generateTreePositions();
            treeGroups = positions.map(p => createTree(p));

            // Audio
            loadAudio();

            // Eventos
            setupControls();

            // Iniciar loop
            animate();

            // Intentar reproducir música
            document.addEventListener('click', () => {
                if (musicAudio && musicEnabled) musicAudio.play().catch(() => {});
            }, { once: true });
        }

        // --- ACTUALIZAR ÁRBOLES (bucle infinito + efecto Baldi) ---
        function updateTrees(distance) {
            const spacing = CONFIG.treeSpacing;
            const total = CONFIG.numTrees;
            const playerZ = -distance * 0.7;

            treeGroups.forEach((tree, i) => {
                const baseZ = -i * spacing - 3;
                let z = baseZ + playerZ;
                if (z > 4) z -= total * spacing;
                if (z < -total * spacing - 6) z += total * spacing;
                tree.position.set(tree.position.x, -0.5, z);
            });
        }

        // --- EFECTO BALDI 2D (billboard + ojos) ---
        function updateBaldiEffect() {
            const playerPos = new THREE.Vector3(0, 1.6, -state.distance * 0.7);

            treeGroups.forEach(tree => {
                const { eyeL, eyeR, leaves } = tree.userData;
                if (!eyeL) return;

                const treePos = tree.position.clone();
                treePos.y = 1.0; // altura de los ojos/hojas

                // Dirección al jugador
                const dir = new THREE.Vector3().subVectors(playerPos, treePos);
                dir.y = 0;
                if (dir.length() > 0.01) dir.normalize();

                // Ángulo para billboard
                const angle = Math.atan2(dir.x, dir.z);

                // 1. Hojas (billboard) - siempre miran al jugador
                if (leaves) {
                    leaves.rotation.y = angle;
                }

                // 2. Ojos (billboard) - siempre miran al jugador
                eyeL.group.rotation.y = angle;
                eyeR.group.rotation.y = angle;

                // 3. Pupilas - se mueven dentro del ojo (efecto de mirada)
                const pupilOffset = 0.035;
                const lx = Math.sin(angle) * pupilOffset;
                const lz = Math.cos(angle) * pupilOffset * 0.5;
                eyeL.pupil.position.set(lx, 0, 0.02 + lz);
                eyeR.pupil.position.set(lx, 0, 0.02 + lz);
            });
        }

        // --- MOVIMIENTO ---
        function handleMovement(delta) {
            const speed = CONFIG.walkSpeed * state.speedMultiplier;
            let moving = false;

            // Dirección basada en la rotación de la cámara
            const forward = new THREE.Vector3(0, 0, -1);
            const right = new THREE.Vector3(1, 0, 0);
            forward.applyQuaternion(camera.quaternion);
            right.applyQuaternion(camera.quaternion);
            forward.y = 0;
            right.y = 0;
            forward.normalize();
            right.normalize();

            const moveDelta = speed * delta * 40;

            // S = adelante, W = atrás
            if (state.keys.s) {
                state.distance += moveDelta;
                moving = true;
            }
            if (state.keys.w) {
                state.distance -= moveDelta;
                moving = true;
            }
            if (state.keys.a) {
                camera.position.x -= right.x * moveDelta * 0.8;
                camera.position.z -= right.z * moveDelta * 0.8;
                moving = true;
            }
            if (state.keys.d) {
                camera.position.x += right.x * moveDelta * 0.8;
                camera.position.z += right.z * moveDelta * 0.8;
                moving = true;
            }

            // Truco de la escalera infinita
            if (state.distance >= CONFIG.maxDistance) {
                state.distance -= CONFIG.teleportOffset;
                state.loopCount++;
                loopNotifCount.textContent = state.loopCount;
                loopNotif.classList.remove('show');
                void loopNotif.offsetWidth;
                loopNotif.classList.add('show');
                setTimeout(() => loopNotif.classList.remove('show'), 900);
            }
            if (state.distance < 0) state.distance = 0;

            // Pasos
            if (moving) {
                state.stepTimer += delta;
                if (state.stepTimer >= CONFIG.stepInterval / state.speedMultiplier) {
                    state.stepTimer = 0;
                    state.steps++;
                    playStep();
                }
            } else {
                state.stepTimer = 0;
            }

            state.isWalking = moving;

            // Actualizar HUD
            distDisplay.textContent = state.distance.toFixed(2);
            loopDisplay.textContent = state.loopCount;
            stepDisplay.textContent = state.steps;
            speedDisplay.textContent = state.speedMultiplier;

            return moving;
        }

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = state.clock.getDelta();

            if (!assetsReady) return;

            handleMovement(delta);
            updateTrees(state.distance);
            updateBaldiEffect(); // Efecto 2D billboard + ojos

            if (skyMesh) skyMesh.rotation.y += 0.00008;

            renderer.render(scene, camera);
        }

        // --- CONTROLES ---
        function setupControls() {
            // Teclado
            document.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                // S = adelante, W = atrás
                if (['s', 'w', 'a', 'd'].includes(k)) {
                    state.keys[k] = true;
                    e.preventDefault();
                }
                if (k === ' ') {
                    e.preventDefault();
                    camera.position.y = 2.2;
                    setTimeout(() => camera.position.y = 1.6, 350);
                }
                // Velocidad con 1,2,3
                if (k === '1') { state.speedMultiplier = 1; speedDisplay.textContent = '1'; }
                if (k === '2') { state.speedMultiplier = 2; speedDisplay.textContent = '2'; }
                if (k === '3') { state.speedMultiplier = 3; speedDisplay.textContent = '3'; }
                // Mute con M
                if (k === 'm') {
                    musicEnabled = !musicEnabled;
                    if (musicAudio) {
                        if (musicEnabled) musicAudio.play().catch(() => {});
                        else musicAudio.pause();
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if (['s', 'w', 'a', 'd'].includes(k)) {
                    state.keys[k] = false;
                    e.preventDefault();
                }
            });

            // Mouse (pointer lock)
            let isLocked = false;

            renderer.domElement.addEventListener('click', () => {
                if (!isLocked) {
                    renderer.domElement.requestPointerLock();
                }
            });

            document.addEventListener('pointerlockchange', () => {
                isLocked = !!document.pointerLockElement;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isLocked) return;

                const sens = CONFIG.mouseSensitivity;
                state.euler.y -= e.movementX * sens;
                state.euler.x -= e.movementY * sens;
                state.euler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, state.euler.x));

                camera.quaternion.setFromEuler(state.euler);
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        console.log('🌀 Dreamcore · Primera Persona');
        console.log('🎮 S · Adelante | W · Atrás');
        console.log('🖱️ Mouse · Mirar');
        console.log('␣ Espacio · Saltar');
        console.log('1,2,3 · Velocidad');
        console.log('M · Silenciar música');
        console.log('👁️ Árboles 2D con efecto Baldi (billboard)');
    </script>
</body>
</html>
