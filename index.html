<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DREAMCORE - Bosque Onírico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
    canvas { display: block; position: fixed; top: 0; left: 0; }

    /* Overlay de inicio */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #87CEEB 0%, #6bb5d9 100%);
      z-index: 200; transition: opacity 1.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.5em; color: #2c3e2f;
      text-shadow: 0 0 40px #a8d5a2, 0 0 80px #6aab5a;
      animation: glow 3s ease-in-out infinite;
      margin-bottom: 0.4em;
      font-weight: 300;
    }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 40px #a8d5a2, 0 0 80px #6aab5a; opacity: 0.9; }
      50%      { text-shadow: 0 0 70px #c8e6c0, 0 0 140px #8bc47a; opacity: 1; }
    }
    #overlay .sub {
      color: #2c4a2a; letter-spacing: 0.2em; font-size: 0.78rem;
      margin-bottom: 2.5em; text-align: center; line-height: 2.2;
      text-transform: uppercase;
    }
    #startBtn {
      padding: 13px 50px; background: rgba(255,255,200,0.2);
      border: 1.5px solid #3a6b2f; color: #2c4a2a;
      font-family: 'Courier New', monospace; font-size: 0.85rem;
      letter-spacing: 0.35em; cursor: pointer; transition: all 0.4s; text-transform: uppercase;
      backdrop-filter: blur(5px);
      font-weight: bold;
    }
    #startBtn:hover { background: #8bc47a33; border-color: #2c4a2a; box-shadow: 0 0 30px #a8d5a266; letter-spacing: 0.45em; }

    /* UI */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 18px; height: 18px;
      pointer-events: none; z-index: 100; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(60, 80, 40, 0.8);
    }
    #crosshair::before { width: 1.5px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 1.5px; top: 50%; transform: translateY(-50%); }
    #crosshair .dot {
      position: absolute; top: 50%; left: 50%; width: 3px; height: 3px;
      background: #3a5a2a; border-radius: 50%; transform: translate(-50%, -50%);
    }

    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #2c4a2aaa; font-size: 0.6rem; letter-spacing: 0.2em;
      pointer-events: none; z-index: 100; display: none;
      background: rgba(255,255,200,0.5); padding: 6px 14px; border-radius: 40px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    /* Pantalla de salida */
    #exitScreen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
      z-index: 300;
      font-family: 'Courier New', monospace;
      text-align: center;
    }
    #exitScreen.show { display: flex; }
    #exitScreen h1 {
      color: #c8b4ff;
      font-size: 2rem;
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px #9b6fff;
    }
    #exitScreen p {
      color: #8899aa;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
    }

    /* ============================================ */
    /* EFECTO VHS - ESTILO AMANDA THE ADVENTURER    */
    /* ============================================ */
    
    /* Capa 1: Viñeta oscura fuerte */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.8) 100%);
      pointer-events: none; z-index: 90; display: none;
    }
    
    /* Capa 2: Scanlines muy marcadas */
    .vhs-scanlines {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 91;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.3) 0px,
        rgba(0, 0, 0, 0.3) 1px,
        transparent 1px,
        transparent 3px
      );
      opacity: 0.7;
    }
    
    /* Capa 3: Aberración cromática tipo Amanda (rojo/cyan separados) */
    .vhs-chromatic-red {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 92;
      background: radial-gradient(ellipse at 50% 50%, rgba(255, 0, 0, 0.15), transparent 70%);
      mix-blend-mode: screen;
    }
    .vhs-chromatic-blue {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 93;
      background: radial-gradient(ellipse at 48% 50%, rgba(0, 255, 255, 0.15), transparent 70%);
      mix-blend-mode: screen;
    }
    
    /* Capa 4: Ruido VHS intenso (grano analógico) */
    .vhs-noise {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 94;
      opacity: 0.25;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjkiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuNyIvPjwvc3ZnPg==');
      background-repeat: repeat;
      background-size: 150px;
      animation: vhsNoise 0.2s steps(2) infinite;
    }
    
    /* Capa 5: Glitch/parpadeo tipo cinta dañada */
    .vhs-glitch {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 95;
      background: rgba(0,0,0,0);
      animation: vhsFlicker 0.08s infinite;
    }
    
    /* Capa 6: Líneas de tracking horizontales (muy características de Amanda) */
    .vhs-tracking-line {
      position: fixed;
      left: -10%;
      width: 120%;
      height: 12px;
      background: rgba(255, 255, 255, 0.4);
      pointer-events: none;
      z-index: 96;
      box-shadow: 0 0 15px rgba(255,255,200,0.8);
      animation: trackingSlide 1.5s ease-in-out infinite;
    }
    .vhs-tracking-line:nth-child(1) { top: 20%; animation-duration: 2.3s; height: 6px; background: rgba(255,200,100,0.5); }
    .vhs-tracking-line:nth-child(2) { top: 55%; animation-duration: 1.8s; height: 10px; background: rgba(255,100,150,0.4); }
    .vhs-tracking-line:nth-child(3) { top: 78%; animation-duration: 3.1s; height: 4px; background: rgba(100,200,255,0.5); }
    .vhs-tracking-line:nth-child(4) { top: 35%; animation-duration: 1.2s; height: 8px; background: rgba(255,255,255,0.6); }
    
    /* Capa 7: Desenfoque de movimiento en bordes */
    .vhs-motion-blur {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 97;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,0,100,0.2);
    }
    
    /* Capa 8: Barras laterales tipo cinta VHS */
    .vhs-bars {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 8px;
      background: rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 98;
      animation: barGlow 1s ease-in-out infinite;
    }
    .vhs-bars.left { left: 0; }
    .vhs-bars.right { right: 0; }
    
    /* Capa 9: Estática tipo Amanda (píxeles blancos/negros) */
    .vhs-static-overlay {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 99;
      background: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0px, rgba(0,0,0,0.08) 2px, transparent 3px, transparent 8px);
      animation: staticShift 0.15s steps(3) infinite;
    }
    
    @keyframes vhsNoise {
      0% { background-position: 0 0; opacity: 0.2; }
      25% { background-position: 25% 50%; opacity: 0.28; }
      50% { background-position: 50% 100%; opacity: 0.22; }
      75% { background-position: 75% 25%; opacity: 0.3; }
      100% { background-position: 100% 0; opacity: 0.18; }
    }
    
    @keyframes vhsFlicker {
      0%, 100% { background: rgba(0,0,0,0); }
      1% { background: rgba(255,255,255,0.12); }
      2% { background: rgba(0,0,0,0.15); }
      3% { background: rgba(255,0,0,0.08); }
      4% { background: rgba(0,255,255,0.08); }
      5% { background: rgba(0,0,0,0); }
      48% { background: rgba(0,0,0,0); }
      49% { background: rgba(255,255,200,0.1); }
      50% { background: rgba(0,0,0,0.2); }
      51% { background: rgba(0,0,0,0); }
      95% { background: rgba(0,0,0,0); }
      96% { background: rgba(255,0,100,0.05); }
      97% { background: rgba(0,255,200,0.05); }
      98% { background: rgba(0,0,0,0.1); }
    }
    
    @keyframes trackingSlide {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(100%); opacity: 0; }
    }
    
    @keyframes barGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; background: rgba(0,0,0,0.8); box-shadow: 0 0 5px rgba(255,255,255,0.3); }
    }
    
    @keyframes staticShift {
      0% { background-position: 0% 0%; opacity: 0.3; }
      100% { background-position: 10% 20%; opacity: 0.5; }
    }
    
    /* Efecto de "wobble" en toda la pantalla */
    .vhs-wobble {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 89;
      animation: screenWobble 0.12s ease-in-out infinite;
    }
    
    @keyframes screenWobble {
      0%, 100% { transform: skewX(0deg); }
      25% { transform: skewX(0.5deg); }
      75% { transform: skewX(-0.3deg); }
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>DREAMCORE</h1>
  <div class="sub">
    ◆ el bosque que no termina ◆<br>
    <span style="color:#3a6b2faa;font-size:0.9em">✦ explora · escucha · camina ✦</span>
  </div>
  <button id="startBtn">[ entrar al sueño ]</button>
  <p style="margin-top:2.5rem;font-size:0.6rem;color:#3a6b2faa;letter-spacing:0.2em">
    🎮 WASD · mover &nbsp;|&nbsp; 🖱️ MOUSE · mirar &nbsp;|&nbsp; ⚡ SHIFT · correr &nbsp;|&nbsp; ⎋ ESC · salir
  </p>
</div>

<div id="exitScreen">
  <h1>✦ HAS SALIDO DEL SUEÑO ✦</h1>
  <p>Recarga la página para volver al bosque</p>
  <p style="margin-top:20px;font-size:0.7rem">[ CTRL + R o F5 ]</p>
</div>

<div id="crosshair"><div class="dot"></div></div>
<div id="hint">WASD · mover | SHIFT · correr | ESC · salir</div>

<!-- Capas VHS estilo Amanda the Adventurer -->
<div id="vignette"></div>
<div class="vhs-scanlines"></div>
<div class="vhs-chromatic-red"></div>
<div class="vhs-chromatic-blue"></div>
<div class="vhs-noise"></div>
<div class="vhs-glitch"></div>
<div class="vhs-tracking-line"></div>
<div class="vhs-tracking-line"></div>
<div class="vhs-tracking-line"></div>
<div class="vhs-tracking-line"></div>
<div class="vhs-motion-blur"></div>
<div class="vhs-bars left"></div>
<div class="vhs-bars right"></div>
<div class="vhs-static-overlay"></div>
<div class="vhs-wobble"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// ASSETS - Usando los archivos que ya están en tu GitHub
// ============================================================
const ASSETS_BASE = 'https://raw.githubusercontent.com/FranciscoFuentesT/dreamcore/main/';

// ------------------------------------------------------------
// 1. RENDERER
// ------------------------------------------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ------------------------------------------------------------
// 2. ESCENA Y CÁMARA - DÍA
// ------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0xadd8e6, 0.008);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.08, 320);
camera.position.set(0, 1.75, 0);

// Controles
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const PI2 = Math.PI / 2;
let locked = false;
let gameStarted = false;

// ESC sale de la página
document.addEventListener('keydown', (e) => {
  if (e.code === 'Escape' && gameStarted) {
    if (bgMusicElement) {
      bgMusicElement.pause();
      bgMusicElement.currentTime = 0;
    }
    if (audioContext) {
      audioContext.close();
    }
    document.getElementById('exitScreen').classList.add('show');
    if (locked) document.exitPointerLock();
    renderer.domElement.style.display = 'none';
    document.getElementById('crosshair').style.display = 'none';
    document.getElementById('hint').style.display = 'none';
    document.getElementById('vignette').style.display = 'none';
    gameStarted = false;
    try { window.close(); } catch(e) {}
  }
});

// Pointer lock
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  document.getElementById('crosshair').style.display = locked ? 'block' : 'none';
  document.getElementById('hint').style.display = locked ? 'block' : 'none';
  document.getElementById('vignette').style.display = locked ? 'block' : 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!locked) return;
  euler.setFromQuaternion(camera.quaternion);
  euler.y -= e.movementX * 0.0022;
  euler.x = Math.max(-PI2, Math.min(PI2, euler.x - e.movementY * 0.0022));
  camera.quaternion.setFromEuler(euler);
});

// Teclado
const keys = {};
document.addEventListener('keydown', (e) => { keys[e.code] = true; });
document.addEventListener('keyup', (e) => { keys[e.code] = false; });

// ------------------------------------------------------------
// 3. LUCES - DÍA
// ------------------------------------------------------------
scene.add(new THREE.AmbientLight(0x8cb0d9, 1.2));

const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
sunLight.position.set(50, 80, -30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 150;
sunLight.shadow.camera.left = -30;
sunLight.shadow.camera.right = 30;
sunLight.shadow.camera.top = 30;
sunLight.shadow.camera.bottom = -30;
scene.add(sunLight);

const fillLight = new THREE.PointLight(0xffcc88, 0.5);
fillLight.position.set(10, 15, 5);
scene.add(fillLight);

// ------------------------------------------------------------
// 4. TEXTURAS
// ------------------------------------------------------------
const texLoader = new THREE.TextureLoader();

texLoader.load(ASSETS_BASE + 'deamcore.jpg', 
  (tex) => { scene.background = tex; tex.mapping = THREE.EquirectangularMapping; },
  undefined,
  () => { console.warn("deamcore.jpg no cargado"); }
);

texLoader.load(ASSETS_BASE + 'grass_ps1.jpg', 
  (tex) => {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(55, 55);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    const groundMat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85, metalness: 0.05 });
    const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(620, 620), groundMat);
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.receiveShadow = true;
    scene.add(groundPlane);
  },
  undefined,
  () => {
    const groundPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(620, 620),
      new THREE.MeshStandardMaterial({ color: 0x5a8f4c, roughness: 0.9 })
    );
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.receiveShadow = true;
    scene.add(groundPlane);
  }
);

// ------------------------------------------------------------
// 5. ÁRBOLES BILLBOARD
// ------------------------------------------------------------
const trees = [];
texLoader.load(ASSETS_BASE + 'tree_ps1.png',
  (tex) => {
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    const leafMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, alphaTest: 0.1 });
    for (let i = 0; i < 160; i++) {
      const scaleTree = 0.7 + Math.random() * 0.9;
      const planeGeo = new THREE.PlaneGeometry(5.6 * scaleTree, 11.2 * scaleTree);
      const treeMesh = new THREE.Mesh(planeGeo, leafMat);
      let x, z;
      do { x = (Math.random() - 0.5) * 290; z = (Math.random() - 0.5) * 290; }
      while (Math.hypot(x, z) < 14);
      treeMesh.position.set(x, 5.2 * scaleTree, z);
      scene.add(treeMesh);
      trees.push(treeMesh);
    }
  },
  undefined,
  () => { console.warn("tree_ps1.png no cargado"); }
);

// Elementos decorativos
const rockMat = new THREE.MeshStandardMaterial({ color: 0x8a8a7a, roughness: 0.8 });
for (let i = 0; i < 200; i++) {
  const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.12 + Math.random() * 0.15), rockMat);
  const x = (Math.random() - 0.5) * 280;
  const z = (Math.random() - 0.5) * 280;
  if (Math.hypot(x, z) > 8) {
    rock.position.set(x, 0.1, z);
    rock.scale.set(1, Math.random() * 0.6 + 0.4, 1);
    rock.castShadow = true;
    rock.receiveShadow = true;
    scene.add(rock);
  }
}

// Partículas flotantes
const particleCount = 800;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = [];
for (let i = 0; i < particleCount; i++) {
  particlePositions.push((Math.random() - 0.5) * 300);
  particlePositions.push(Math.random() * 6);
  particlePositions.push((Math.random() - 0.5) * 280);
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePositions), 3));
const particleMat = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.05, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ------------------------------------------------------------
// 6. AUDIO
// ------------------------------------------------------------
let audioContext = null;
let bgMusicElement = null;
let stepBuffer = null;
let stepCooldown = false;
const STEP_WALK_DELAY = 380;
const STEP_RUN_DELAY = 250;

function initAudioSystem() {
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    bgMusicElement = new Audio(ASSETS_BASE + 'dreamcore.mp3');
    bgMusicElement.loop = true;
    bgMusicElement.volume = 0.5;
    bgMusicElement.play().catch(e => console.warn("Audio autoplay bloqueado", e));
    
    fetch(ASSETS_BASE + 'pasos.mp3')
      .then(res => res.arrayBuffer())
      .then(buf => audioContext.decodeAudioData(buf))
      .then(decoded => { stepBuffer = decoded; console.log("✅ pasos.mp3 cargado"); })
      .catch(err => console.warn("pasos.mp3 no cargado", err));
  } catch(e) { console.warn("Web Audio API no soportada", e); }
}

function playFootstep(running) {
  if (!audioContext || !stepBuffer || stepCooldown) return;
  
  stepCooldown = true;
  setTimeout(() => { stepCooldown = false; }, running ? STEP_RUN_DELAY : STEP_WALK_DELAY);
  
  const source = audioContext.createBufferSource();
  source.buffer = stepBuffer;
  const pitchVar = 0.85 + Math.random() * 0.3;
  source.playbackRate.value = pitchVar;
  
  const gainNode = audioContext.createGain();
  gainNode.gain.value = 0.6 + Math.random() * 0.2;
  source.connect(gainNode);
  gainNode.connect(audioContext.destination);
  source.start();
}

// ------------------------------------------------------------
// 7. GAME LOOP
// ------------------------------------------------------------
const moveVec = new THREE.Vector3();
const forwardDir = new THREE.Vector3();
const rightDir = new THREE.Vector3();
let bobCounter = 0;

function updateMovement(deltaTime) {
  if (!locked || !gameStarted) return;
  
  const running = (keys['ShiftLeft'] || keys['ShiftRight']);
  const currentSpeed = running ? 7.0 : 4.0;
  let isMoving = false;
  
  moveVec.set(0, 0, 0);
  camera.getWorldDirection(forwardDir);
  forwardDir.y = 0;
  forwardDir.normalize();
  rightDir.crossVectors(forwardDir, camera.up).normalize();
  
  if (keys['KeyW']) { moveVec.addScaledVector(forwardDir, 1); isMoving = true; }
  if (keys['KeyS']) { moveVec.addScaledVector(forwardDir, -1); isMoving = true; }
  if (keys['KeyA']) { moveVec.addScaledVector(rightDir, -1); isMoving = true; }
  if (keys['KeyD']) { moveVec.addScaledVector(rightDir, 1); isMoving = true; }
  
  if (isMoving) {
    moveVec.normalize();
    camera.position.addScaledVector(moveVec, currentSpeed * deltaTime);
    playFootstep(running);
    
    bobCounter += deltaTime * (running ? 11 : 7.5);
    camera.position.y = 1.72 + Math.sin(bobCounter) * 0.03;
  } else {
    camera.position.y += (1.72 - camera.position.y) * 0.12;
  }
  
  camera.position.x = Math.min(275, Math.max(-275, camera.position.x));
  camera.position.z = Math.min(275, Math.max(-275, camera.position.z));
}

function updateBillboards() {
  const camPos = camera.position;
  trees.forEach(tree => {
    if(tree) tree.lookAt(camPos.x, tree.position.y, camPos.z);
  });
}

function updateParticles(delta) {
  particles.rotation.y += 0.005;
}

// Efecto VHS dinámico adicional (movimiento de aberración tipo Amanda)
let vhsTime = 0;
function updateVHSDynamic(delta) {
  vhsTime += delta;
  const redLayer = document.querySelector('.vhs-chromatic-red');
  const blueLayer = document.querySelector('.vhs-chromatic-blue');
  if (redLayer && blueLayer && locked) {
    // Movimiento errático tipo cinta dañada
    const shakeX = Math.sin(vhsTime * 45) * 2.5 + Math.cos(vhsTime * 31) * 1.2;
    const shakeY = Math.cos(vhsTime * 38) * 1.8;
    redLayer.style.transform = `translate(${shakeX}px, ${shakeY}px)`;
    blueLayer.style.transform = `translate(${-shakeX * 1.2}px, ${-shakeY * 0.7}px)`;
  }
}

// ------------------------------------------------------------
// 8. INICIO
// ------------------------------------------------------------
document.getElementById('startBtn').addEventListener('click', () => {
  if (gameStarted) return;
  initAudioSystem();
  gameStarted = true;
  const overlayDiv = document.getElementById('overlay');
  overlayDiv.classList.add('hidden');
  renderer.domElement.style.display = 'block';
  setTimeout(() => {
    renderer.domElement.requestPointerLock();
  }, 200);
});

renderer.domElement.addEventListener('click', () => {
  if (gameStarted && !locked) renderer.domElement.requestPointerLock();
});

// ------------------------------------------------------------
// 9. BUCLE PRINCIPAL
// ------------------------------------------------------------
let lastTime = performance.now();
function mainLoop() {
  const now = performance.now();
  let delta = Math.min(0.033, (now - lastTime) / 1000);
  lastTime = now;
  if (delta < 0.003) delta = 0.016;
  
  if (gameStarted && locked) {
    updateMovement(delta);
    updateBillboards();
    updateParticles(delta);
    updateVHSDynamic(delta);
  }
  
  if (gameStarted) {
    renderer.render(scene, camera);
  }
  requestAnimationFrame(mainLoop);
}

mainLoop();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
